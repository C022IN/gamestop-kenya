name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Web / Next.js ─────────────────────────────────────────────────────────
  web-quality:
    name: Web — lint & build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # ── TV App ────────────────────────────────────────────────────────────────
  tv-typecheck:
    name: TV app — TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: tv-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tv-app/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc --noEmit

  tv-bundle:
    name: TV app — Metro bundle (Android)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: tv-typecheck
    defaults:
      run:
        working-directory: tv-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tv-app/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Expo export (bundle dry-run)
        run: npx expo export --platform android --dev
        env:
          CI: 'true'

      - name: Confirm bundle exists
        run: |
          BUNDLE=$(find dist -name "*.js" | head -1)
          if [ -z "$BUNDLE" ]; then
            echo "ERROR: No JS bundle produced" && exit 1
          fi
          SIZE=$(du -sh "$BUNDLE" | cut -f1)
          echo "Bundle: $BUNDLE ($SIZE)" >> $GITHUB_STEP_SUMMARY
