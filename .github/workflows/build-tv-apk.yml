name: Build TV App (Local APK)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options: [preview, production]

concurrency:
  group: build-tv-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: tv-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: tv-app/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc --noEmit

  build:
    name: Android TV APK — Local Build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: typecheck

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: tv-app/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install tv-app dependencies
        working-directory: tv-app
        run: npm install --legacy-peer-deps

      - name: Generate native Android project (TV variant)
        working-directory: tv-app
        env:
          APP_VARIANT: tv
        run: npx expo prebuild --platform android --clean --no-install

      - name: Patch ExpoModulesPackageList — suppress OPT_IN Kotlin errors
        # Expo-generated ExpoModulesPackageList.kt uses experimental API markers
        # that Kotlin strict mode rejects. This init script prepends @file:Suppress
        # before the file is compiled so the build doesn't error.
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/opt-in.gradle << 'GRADLE'
          gradle.projectsEvaluated {
            allprojects { proj ->
              if (proj.name == "expo") {
                proj.tasks.matching { it.name == "compileReleaseKotlin" }.configureEach { t ->
                  t.doFirst {
                    def f = proj.file("build/generated/expo/src/main/java/expo/modules/ExpoModulesPackageList.kt")
                    if (f.exists() && !f.text.contains("@file:Suppress")) {
                      def suppress = '@file:Suppress("OPT_IN_USAGE_ERROR", "OPT_IN_USAGE", "EXPERIMENTAL_API_USAGE_ERROR", "EXPERIMENTAL_API_USAGE")' + System.lineSeparator()
                      f.text = suppress + f.text
                    }
                  }
                }
              }
            }
          }
          GRADLE
          echo "---- generated init script ----"
          cat ~/.gradle/init.d/opt-in.gradle
          echo "---- end ----"

      - name: Build APK / AAB with Gradle
        working-directory: tv-app/android
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          if [ "$PROFILE" = "production" ]; then
            ./gradlew bundleRelease
            find . -name "*.aab" -exec cp {} ../gamestop-tv.aab \;
          else
            ./gradlew assembleRelease
            find . -name "app-release*.apk" -exec cp {} ../gamestop-tv.apk \;
          fi

      - name: Upload APK artifact
        if: github.event.inputs.profile != 'production'
        uses: actions/upload-artifact@v4
        with:
          name: gamestop-tv-apk-${{ github.sha }}
          path: tv-app/gamestop-tv.apk
          retention-days: 30

      - name: Upload AAB artifact
        if: github.event.inputs.profile == 'production'
        uses: actions/upload-artifact@v4
        with:
          name: gamestop-tv-aab-${{ github.sha }}
          path: tv-app/gamestop-tv.aab
          retention-days: 30

      - name: Build summary
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          echo "## GameStop Movies TV — Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "**Profile:** $PROFILE" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$PROFILE" = "production" ]; then
            echo "Download the **AAB** from the Artifacts section above." >> $GITHUB_STEP_SUMMARY
          else
            echo "Download the **APK** from the Artifacts section above." >> $GITHUB_STEP_SUMMARY
          fi
