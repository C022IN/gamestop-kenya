name: Build TV App (Local APK)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options: [preview, production]

concurrency:
  group: build-tv-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Android TV APK — Local Build
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tv-app/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install tv-app dependencies
        working-directory: tv-app
        run: npm install --legacy-peer-deps

      - name: Generate native Android project (TV variant)
        working-directory: tv-app
        env:
          APP_VARIANT: tv
        run: npx expo prebuild --platform android --clean --no-install

      - name: Patch ExpoModulesPackageList to opt-in to experimental APIs
        run: |
          mkdir -p ~/.gradle/init.d
          printf '%s\n' \
            'gradle.projectsEvaluated {' \
            '  allprojects { proj ->' \
            '    if (proj.name == "expo") {' \
            '      proj.tasks.matching { it.name == "compileReleaseKotlin" }.configureEach { t ->' \
            '        t.doFirst {' \
            '          def f = proj.file("build/generated/expo/src/main/java/expo/modules/ExpoModulesPackageList.kt")' \
            '          if (f.exists() && !f.text.contains("@file:OptIn")) {' \
            '            def optins = "@file:OptIn(kotlinx.coroutines.ExperimentalCoroutinesApi::class, kotlinx.coroutines.InternalCoroutinesApi::class, expo.modules.kotlin.jni.ExpType::class)\n"' \
            '            f.text = optins + f.text' \
            '          }' \
            '        }' \
            '      }' \
            '    }' \
            '  }' \
            '}' \
            > ~/.gradle/init.d/opt-in.gradle

      - name: Build APK with Gradle
        working-directory: tv-app/android
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          if [ "$PROFILE" = "production" ]; then
            ./gradlew bundleRelease
            find . -name "*.aab" -exec cp {} ../gamestop-tv.aab \;
          else
            ./gradlew assembleRelease
            find . -name "app-release*.apk" -exec cp {} ../gamestop-tv.apk \;
          fi

      - name: Upload APK artifact
        if: github.event.inputs.profile != 'production'
        uses: actions/upload-artifact@v4
        with:
          name: gamestop-tv-apk-${{ github.sha }}
          path: tv-app/gamestop-tv.apk
          retention-days: 30

      - name: Upload AAB artifact
        if: github.event.inputs.profile == 'production'
        uses: actions/upload-artifact@v4
        with:
          name: gamestop-tv-aab-${{ github.sha }}
          path: tv-app/gamestop-tv.aab
          retention-days: 30

      - name: Build summary
        run: |
          echo "## GameStop Movies TV — Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "**Profile:** ${{ github.event.inputs.profile || 'preview' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the APK/AAB from the **Artifacts** section above." >> $GITHUB_STEP_SUMMARY
