name: Build TV App (Local APK)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options: [preview, production]

concurrency:
  group: build-tv-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Android TV APK — Local Build
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: tv-app/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Install tv-app dependencies
        working-directory: tv-app
        run: npm install --legacy-peer-deps

      - name: Build APK locally (no EAS quota used)
        working-directory: tv-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          echo "Building profile: $PROFILE"
          eas build \
            --platform android \
            --profile "$PROFILE" \
            --local \
            --non-interactive \
            --output ./gamestop-tv.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gamestop-tv-apk-${{ github.sha }}
          path: tv-app/gamestop-tv.apk
          retention-days: 30

      - name: Build summary
        run: |
          echo "## GameStop Movies TV — Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "**Profile:** ${{ github.event.inputs.profile || 'preview' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the APK from the **Artifacts** section above." >> $GITHUB_STEP_SUMMARY
