name: Build TV App (APK + AAB)

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Version code (integer, e.g. 2)'
        required: false
        default: '1'
      version_name:
        description: 'Version name (e.g. 1.0.1)'
        required: false
        default: '1.0.0'
  push:
    branches: [main]
    paths:
      - 'tv-app/**'

concurrency:
  group: build-tv-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android TV APK + AAB
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Java 17 ─────────────────────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Node 18 ─────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: tv-app/package-lock.json

      # ── Android SDK ──────────────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── Gradle bootstrap (generates gradle-wrapper.jar) ──────────────────────
      - name: Bootstrap Gradle wrapper
        working-directory: tv-app/android
        run: |
          gradle wrapper --gradle-version=8.8 --distribution-type=bin
          chmod +x gradlew

      # ── Node dependencies ────────────────────────────────────────────────────
      - name: Install Node dependencies
        working-directory: tv-app
        run: npm ci

      # ── Decode keystore from secret ──────────────────────────────────────────
      - name: Decode release keystore
        if: ${{ secrets.TV_KEYSTORE_BASE64 != '' }}
        working-directory: tv-app/android
        run: |
          echo "${{ secrets.TV_KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          echo "KEYSTORE_FILE=$(pwd)/release.keystore" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=${{ secrets.TV_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.TV_KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.TV_KEY_PASSWORD }}" >> $GITHUB_ENV

      # ── Bump version ──────────────────────────────────────────────────────────
      - name: Set version
        working-directory: tv-app/android
        run: |
          sed -i "s/versionCode [0-9]*/versionCode ${{ github.event.inputs.version_code || '1' }}/" app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"${{ github.event.inputs.version_name || '1.0.0' }}\"/" app/build.gradle

      # ── Debug APK (no signing needed) ────────────────────────────────────────
      - name: Build Debug APK
        working-directory: tv-app/android
        run: ./gradlew assembleDebug --no-daemon

      # ── Release APK (signed — for sideload + Fire TV + Amazon Appstore) ──────
      - name: Build Release APK
        working-directory: tv-app/android
        run: ./gradlew assembleRelease --no-daemon

      # ── Release AAB (signed — for Google Play Store) ─────────────────────────
      - name: Build Release AAB (Play Store)
        working-directory: tv-app/android
        run: ./gradlew bundleRelease --no-daemon

      # ── Upload debug APK ─────────────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: gamestop-movies-tv-debug-apk
          path: tv-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      # ── Upload release APK (sideload / Fire TV / Amazon Appstore) ────────────
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: gamestop-movies-tv-release-apk
          path: tv-app/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      # ── Upload AAB (Google Play Store) ───────────────────────────────────────
      - name: Upload Release AAB (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: gamestop-movies-tv-release-aab
          path: tv-app/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      # ── Summary ─────────────────────────────────────────────────────────────
      - name: Build summary
        run: |
          echo "## GameStop Movies TV Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Purpose |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| \`app-debug.apk\` | Sideload on any Android TV for testing |" >> $GITHUB_STEP_SUMMARY
          echo "| \`app-release.apk\` | Sideload + Amazon Appstore submission |" >> $GITHUB_STEP_SUMMARY
          echo "| \`app-release.aab\` | Google Play Store submission |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download artifacts from the **Actions** tab above." >> $GITHUB_STEP_SUMMARY
