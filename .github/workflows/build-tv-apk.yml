name: Build TV App (EAS Build)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options: [preview, production]
  push:
    branches: [main]
    paths:
      - 'tv-app/src/**'
      - 'tv-app/app.config.ts'
      - 'tv-app/eas.json'

concurrency:
  group: build-tv-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: EAS Build — Android TV
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: tv-app/package-lock.json

      - name: Install dependencies
        working-directory: tv-app
        run: npm install --legacy-peer-deps

      - name: Setup EAS CLI
        run: npm install -g eas-cli@latest

      - name: EAS Build — APK/AAB
        working-directory: tv-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          echo "Building profile: $PROFILE"
          eas build \
            --platform android \
            --profile "$PROFILE" \
            --non-interactive \
            --no-wait
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## GameStop Movies TV — EAS Build submitted" >> $GITHUB_STEP_SUMMARY
          echo "Profile: **$PROFILE**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Monitor and download at: https://expo.dev/accounts/[your-account]/projects/gamestop-movies-tv/builds" >> $GITHUB_STEP_SUMMARY
