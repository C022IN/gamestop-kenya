apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

react {
    // Required by react-native-tvos
}

android {
    namespace "ke.co.gamestop.movies"
    compileSdk 35

    defaultConfig {
        applicationId "ke.co.gamestop.movies"
        minSdk 21            // Android 5 — covers most smart TVs from 2016+
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    signingConfigs {
        release {
            // Set via environment or local.properties:
            // KEYSTORE_FILE, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD
            if (System.getenv("KEYSTORE_FILE")) {
                storeFile file(System.getenv("KEYSTORE_FILE"))
                storePassword System.getenv("KEYSTORE_PASSWORD")
                keyAlias System.getenv("KEY_ALIAS")
                keyPassword System.getenv("KEY_PASSWORD")
            }
        }
    }

    buildTypes {
        debug {
            debuggable true
        }
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            if (System.getenv("KEYSTORE_FILE")) {
                signingConfig signingConfigs.release
            }
        }
    }

    // Landscape only — standard for TV apps
    defaultConfig {
        resConfigs "en", "sw"   // English + Swahili
    }
}

dependencies {
    // React Native
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")

    // AndroidX
    implementation "androidx.appcompat:appcompat:1.6.1"
    implementation "androidx.leanback:leanback:1.0.0"   // TV Leanback UI support
}
