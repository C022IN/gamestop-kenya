apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

react {
    // React Native TV — hermesEnabled/newArchEnabled read from gradle.properties
}

android {
    namespace "ke.co.gamestop.movies"
    compileSdk 35

    defaultConfig {
        applicationId "ke.co.gamestop.movies"
        minSdk 21           // Android 5 — covers smart TVs from 2016+
        targetSdk 34
        versionCode (System.getenv("BUILD_NUMBER") ?: "1").toInteger()
        versionName System.getenv("VERSION_NAME") ?: "1.0.0"
        resConfigs "en", "sw"

        buildConfigField "boolean", "IS_NEW_ARCHITECTURE_ENABLED", "false"
        buildConfigField "boolean", "IS_HERMES_ENABLED", "true"
    }

    signingConfigs {
        release {
            def keystoreFile = System.getenv("KEYSTORE_FILE")
            if (keystoreFile) {
                storeFile file(keystoreFile)
                storePassword System.getenv("KEYSTORE_PASSWORD")
                keyAlias System.getenv("KEY_ALIAS")
                keyPassword System.getenv("KEY_PASSWORD")
            }
        }
    }

    buildTypes {
        debug {
            debuggable true
        }
        release {
            debuggable false
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            if (System.getenv("KEYSTORE_FILE")) {
                signingConfig signingConfigs.release
            }
        }
    }

    buildFeatures {
        buildConfig true
    }

    packagingOptions {
        pickFirst '**/libc++_shared.so'
        pickFirst '**/libfbjni.so'
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")
    implementation "androidx.appcompat:appcompat:1.7.0"
    implementation "androidx.leanback:leanback:1.0.0"
}
