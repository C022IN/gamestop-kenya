<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350" width="400" height="350">
  <defs>
<linearGradient id="luxSheen" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
  <stop offset="40%" stop-color="#ffffff" stop-opacity="0.04"/>
  <stop offset="100%" stop-color="#000000" stop-opacity="0.06"/>
</linearGradient>
<radialGradient id="luxVignette" cx="50%" cy="45%" r="75%">
  <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
  <stop offset="100%" stop-color="#000000" stop-opacity="0.28"/>
</radialGradient>
<filter id="luxGrain">
  <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="7" stitchTiles="stitch"/>
  <feColorMatrix type="saturate" values="0"/>
  <feComponentTransfer>
    <feFuncA type="table" tableValues="0 0.045"/>
  </feComponentTransfer>
</filter>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0015"/>
      <stop offset="100%" style="stop-color:#1a0025"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="350" fill="url(#bg)"/>

  <!-- Nintendo Switch OLED centered -->
  <g transform="translate(255,175)">
    <!-- Left Joy-Con (Red) -->
    <rect x="-100" y="-68" width="30" height="136" rx="12" fill="#cc0000"/>
    <rect x="-98" y="-66" width="26" height="132" rx="10" fill="#dd1111"/>
    <!-- Left stick -->
    <circle cx="-85" cy="-40" r="9" fill="#bb0000"/>
    <circle cx="-85" cy="-40" r="6" fill="#aa0000"/>
    <!-- D-pad -->
    <rect x="-91" y="-15" width="7" height="18" rx="2" fill="#bb0000"/>
    <rect x="-97" y="-9" width="18" height="7" rx="2" fill="#bb0000"/>
    <!-- Buttons -->
    <circle cx="-78" cy="-20" r="4" fill="#aa0000"/>
    <!-- Rail -->
    <rect x="-72" y="-67" width="7" height="135" fill="#222"/>

    <!-- Screen / body -->
    <rect x="-66" y="-72" width="132" height="144" rx="5" fill="#0a0a15"/>
    <!-- OLED Screen -->
    <rect x="-62" y="-68" width="124" height="136" rx="4" fill="#1155dd"/>
    <!-- Game on screen: Mario character -->
    <rect x="-62" y="-68" width="124" height="68" rx="4" fill="#2266ff"/>
    <rect x="-62" y="0" width="124" height="68" rx="0" fill="#1a3388"/>
    <!-- Stars on screen -->
    <circle cx="-30" cy="-45" r="3" fill="#ffff88" opacity="0.8"/>
    <circle cx="10" cy="-55" r="2" fill="#ffff88" opacity="0.6"/>
    <circle cx="40" cy="-48" r="3" fill="#ffff88" opacity="0.7"/>
    <!-- Mario on screen -->
    <circle cx="0" cy="-20" r="12" fill="#ffcc88"/>
    <rect x="-14" y="-30" width="28" height="12" rx="6" fill="#cc0000"/>
    <text x="0" y="-25" text-anchor="middle" font-size="8" fill="white" font-weight="bold">M</text>
    <rect x="-11" y="-8" width="22" height="16" rx="4" fill="#cc0000"/>
    <rect x="-11" y="-2" width="22" height="10" rx="2" fill="#2244cc"/>
    <!-- Ground -->
    <rect x="-62" y="22" width="124" height="10" fill="#228822" opacity="0.8"/>
    <!-- Home/screenshot -->
    <circle cx="0" cy="72" r="6" fill="#333"/>
    <rect x="-16" y="69" width="10" height="6" rx="2" fill="#333"/>

    <!-- Right Joy-Con (Blue) -->
    <rect x="65" y="-68" width="30" height="136" rx="12" fill="#0055cc"/>
    <rect x="67" y="-66" width="26" height="132" rx="10" fill="#0066dd"/>
    <!-- Right stick -->
    <circle cx="83" cy="-40" r="9" fill="#0044bb"/>
    <circle cx="83" cy="-40" r="6" fill="#0033aa"/>
    <!-- Action buttons -->
    <circle cx="80" cy="-20" r="5" fill="#0044bb"/>
    <text x="80" y="-16" text-anchor="middle" font-size="7" fill="#ff4488">A</text>
    <circle cx="92" cy="-28" r="5" fill="#0044bb"/>
    <text x="92" y="-24" text-anchor="middle" font-size="7" fill="#ffaa00">B</text>
    <circle cx="80" cy="-36" r="5" fill="#0044bb"/>
    <text x="80" y="-32" text-anchor="middle" font-size="6" fill="#44ff88">X</text>
    <circle cx="68" cy="-28" r="5" fill="#0044bb"/>
    <text x="68" y="-24" text-anchor="middle" font-size="7" fill="#4488ff">Y</text>
    <!-- Rail right -->
    <rect x="64" y="-67" width="7" height="135" fill="#222"/>
  </g>

  <!-- Text content -->
  <text x="30" y="75" font-family="Arial Black, sans-serif" font-size="10" fill="#ff4444" letter-spacing="3">PLAY ANYWHERE</text>
  <text x="28" y="110" font-family="Arial Black, sans-serif" font-size="18" font-weight="900" fill="white">Nintendo</text>
  <text x="28" y="145" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="#cc0000">Switch OLED</text>

  <!-- Price -->
  <rect x="28" y="162" width="155" height="42" rx="8" fill="#330000" opacity="0.6"/>
  <text x="36" y="184" font-family="Arial Black, sans-serif" font-size="10" fill="#ff8888">FROM</text>
  <text x="36" y="198" font-family="Arial Black, sans-serif" font-size="14" font-weight="900" fill="white">KSh 45,000</text>

  <!-- Features -->
  <text x="28" y="240" font-family="Arial, sans-serif" font-size="9" fill="#cc7777">● 7-inch OLED Display</text>
  <text x="28" y="258" font-family="Arial, sans-serif" font-size="9" fill="#cc7777">● Handheld + TV Mode</text>
  <text x="28" y="276" font-family="Arial, sans-serif" font-size="9" fill="#cc7777">● Red &amp; Blue Joy-Con</text>
  <text x="28" y="294" font-family="Arial, sans-serif" font-size="9" fill="#cc7777">● 64GB Internal Storage</text>

  <!-- N badge -->
  <rect x="28" y="308" width="28" height="28" rx="6" fill="#cc0000"/>
  <text x="42" y="327" text-anchor="middle" font-family="Arial Black" font-size="14" font-weight="900" fill="white">N</text>

  <rect x="0" y="0" width="400" height="350" fill="none" stroke="#880000" stroke-width="2" opacity="0.4"/>
  <line x1="0" y1="346" x2="400" y2="346" stroke="#cc0000" stroke-width="3" opacity="0.4" filter="url(#glow)"/>
<rect data-lux-overlay="true" x="0" y="0" width="100%" height="100%" fill="url(#luxSheen)" opacity="0.22"/>
<rect x="0" y="0" width="100%" height="100%" fill="url(#luxVignette)" opacity="0.32"/>
<rect x="0" y="0" width="100%" height="100%" filter="url(#luxGrain)" opacity="0.24"/>
</svg>
