<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000a00"/>
      <stop offset="50%" style="stop-color:#001a00"/>
      <stop offset="100%" style="stop-color:#000a00"/>
    </linearGradient>
    <radialGradient id="greenglow" cx="70%" cy="50%" r="55%">
      <stop offset="0%" style="stop-color:#00aa00;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#000a00;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="monolith" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="40%" style="stop-color:#222222"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softshadow">
      <feDropShadow dx="5" dy="10" stdDeviation="15" flood-color="#000a00" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="500" fill="url(#bg)"/>
  <rect width="600" height="500" fill="url(#greenglow)"/>

  <!-- Background hex pattern -->
  <g stroke="#003300" stroke-width="0.5" fill="none" opacity="0.15">
    <polygon points="100,50 130,68 130,104 100,122 70,104 70,68"/>
    <polygon points="160,50 190,68 190,104 160,122 130,104 130,68"/>
    <polygon points="220,50 250,68 250,104 220,122 190,104 190,68"/>
    <polygon points="280,50 310,68 310,104 280,122 250,104 250,68"/>
    <polygon points="340,50 370,68 370,104 340,122 310,104 310,68"/>
    <polygon points="400,50 430,68 430,104 400,122 370,104 370,68"/>
    <polygon points="460,50 490,68 490,104 460,122 430,104 430,68"/>
    <polygon points="520,50 550,68 550,104 520,122 490,104 490,68"/>
    <polygon points="100,122 130,140 130,176 100,194 70,176 70,140"/>
    <polygon points="160,122 190,140 190,176 160,194 130,176 130,140"/>
    <polygon points="460,122 490,140 490,176 460,194 430,176 430,140"/>
    <polygon points="520,122 550,140 550,176 520,194 490,176 490,140"/>
  </g>

  <!-- Xbox Series X console (tall monolith) -->
  <g transform="translate(410, 240)" filter="url(#softshadow)">
    <!-- Main body (tall rectangle - the monolith) -->
    <rect x="-75" y="-170" width="150" height="340" rx="10" fill="url(#monolith)"/>

    <!-- Top vent grill -->
    <rect x="-70" y="-165" width="140" height="80" rx="8" fill="#111111"/>
    <!-- Vent lines -->
    <g stroke="#333" stroke-width="1">
      <line x1="-65" y1="-155" x2="65" y2="-155"/>
      <line x1="-65" y1="-148" x2="65" y2="-148"/>
      <line x1="-65" y1="-141" x2="65" y2="-141"/>
      <line x1="-65" y1="-134" x2="65" y2="-134"/>
      <line x1="-65" y1="-127" x2="65" y2="-127"/>
      <line x1="-65" y1="-120" x2="65" y2="-120"/>
      <line x1="-65" y1="-113" x2="65" y2="-113"/>
      <line x1="-65" y1="-106" x2="65" y2="-106"/>
      <line x1="-65" y1="-99" x2="65" y2="-99"/>
    </g>

    <!-- Xbox X logo circle (top center) -->
    <circle cx="0" cy="-115" r="30" fill="#111111"/>
    <circle cx="0" cy="-115" r="26" fill="#107c10" opacity="0.3"/>
    <circle cx="0" cy="-115" r="20" fill="none" stroke="#107c10" stroke-width="2.5" filter="url(#glow)"/>
    <!-- X in center -->
    <line x1="-12" y1="-127" x2="12" y2="-103" stroke="#107c10" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
    <line x1="12" y1="-127" x2="-12" y2="-103" stroke="#107c10" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>

    <!-- Middle section -->
    <rect x="-70" y="-82" width="140" height="180" rx="4" fill="#1a1a1a"/>
    <!-- Texture dots -->
    <g fill="#252525">
      <circle cx="-50" cy="-50" r="1.5"/>
      <circle cx="-35" cy="-50" r="1.5"/>
      <circle cx="-20" cy="-50" r="1.5"/>
      <circle cx="-5" cy="-50" r="1.5"/>
      <circle cx="10" cy="-50" r="1.5"/>
      <circle cx="25" cy="-50" r="1.5"/>
      <circle cx="40" cy="-50" r="1.5"/>
      <circle cx="55" cy="-50" r="1.5"/>
      <circle cx="-50" cy="-35" r="1.5"/>
      <circle cx="-35" cy="-35" r="1.5"/>
      <circle cx="-20" cy="-35" r="1.5"/>
      <circle cx="-5" cy="-35" r="1.5"/>
      <circle cx="10" cy="-35" r="1.5"/>
      <circle cx="25" cy="-35" r="1.5"/>
      <circle cx="40" cy="-35" r="1.5"/>
      <circle cx="55" cy="-35" r="1.5"/>
      <circle cx="-50" cy="-20" r="1.5"/>
      <circle cx="-35" cy="-20" r="1.5"/>
      <circle cx="-20" cy="-20" r="1.5"/>
      <circle cx="-5" cy="-20" r="1.5"/>
      <circle cx="10" cy="-20" r="1.5"/>
      <circle cx="25" cy="-20" r="1.5"/>
      <circle cx="40" cy="-20" r="1.5"/>
      <circle cx="55" cy="-20" r="1.5"/>
    </g>

    <!-- Disc drive slot -->
    <rect x="-30" y="20" width="60" height="4" rx="2" fill="#0a0a0a"/>
    <rect x="-28" y="21" width="56" height="2" fill="#333" opacity="0.5"/>

    <!-- USB-C port and power button -->
    <rect x="-40" y="35" width="14" height="8" rx="3" fill="#0a0a0a"/>
    <rect x="-20" y="35" width="14" height="8" rx="3" fill="#0a0a0a"/>
    <circle cx="32" cy="39" r="8" fill="#1a1a1a"/>
    <circle cx="32" cy="39" r="5" fill="#107c10" opacity="0.6" filter="url(#glow)"/>

    <!-- Sync button -->
    <circle cx="-48" cy="39" r="6" fill="#222"/>

    <!-- Bottom vent -->
    <rect x="-70" y="98" width="140" height="72" rx="8" fill="#111111"/>
    <g stroke="#222" stroke-width="1">
      <line x1="-65" y1="108" x2="65" y2="108"/>
      <line x1="-65" y1="116" x2="65" y2="116"/>
      <line x1="-65" y1="124" x2="65" y2="124"/>
      <line x1="-65" y1="132" x2="65" y2="132"/>
      <line x1="-65" y1="140" x2="65" y2="140"/>
      <line x1="-65" y1="148" x2="65" y2="148"/>
      <line x1="-65" y1="156" x2="65" y2="156"/>
    </g>

    <!-- Console shadow/base -->
    <ellipse cx="0" cy="175" rx="80" ry="10" fill="#000a00" opacity="0.4"/>
  </g>

  <!-- Xbox controller (left of console) -->
  <g transform="translate(175, 320)" filter="url(#softshadow)">
    <path d="M-75,5 Q-85,-25 -65,-50 Q-45,-72 0,-75 Q45,-72 65,-50 Q85,-25 75,5 Q68,32 52,55 Q38,72 15,78 Q-15,78 -38,72 Q-62,60 -75,5 Z" fill="#1a1a1a"/>
    <!-- Green accent on triggers -->
    <rect x="-60" y="-72" width="28" height="14" rx="5" fill="#107c10" opacity="0.7"/>
    <rect x="32" y="-72" width="28" height="14" rx="5" fill="#107c10" opacity="0.7"/>
    <!-- Buttons right -->
    <circle cx="44" cy="-32" r="7" fill="#1a1a1a"/>
    <text x="44" y="-28" text-anchor="middle" font-size="8" fill="#ffaa00">Y</text>
    <circle cx="56" cy="-44" r="7" fill="#1a1a1a"/>
    <text x="56" y="-40" text-anchor="middle" font-size="8" fill="#4488ff">B</text>
    <circle cx="44" cy="-56" r="7" fill="#1a1a1a"/>
    <text x="44" y="-52" text-anchor="middle" font-size="8" fill="#44cc44">X</text>
    <circle cx="32" cy="-44" r="7" fill="#1a1a1a"/>
    <text x="32" y="-40" text-anchor="middle" font-size="8" fill="#ee4444">A</text>
    <!-- D-pad left -->
    <circle cx="-45" cy="-44" r="14" fill="#222"/>
    <rect x="-49" y="-54" width="8" height="8" rx="1" fill="#333"/>
    <rect x="-49" y="-38" width="8" height="8" rx="1" fill="#333"/>
    <rect x="-55" y="-48" width="8" height="8" rx="1" fill="#333"/>
    <rect x="-41" y="-48" width="8" height="8" rx="1" fill="#333"/>
    <!-- Xbox button center -->
    <circle cx="0" cy="-30" r="14" fill="#222"/>
    <circle cx="0" cy="-30" r="10" fill="#107c10" opacity="0.5" filter="url(#glow)"/>
    <line x1="-6" y1="-36" x2="6" y2="-24" stroke="#107c10" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
    <line x1="6" y1="-36" x2="-6" y2="-24" stroke="#107c10" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
    <!-- Analog sticks -->
    <circle cx="-22" cy="10" r="14" fill="#333"/>
    <circle cx="-22" cy="10" r="9" fill="#444"/>
    <circle cx="22" cy="10" r="14" fill="#333"/>
    <circle cx="22" cy="10" r="9" fill="#444"/>
    <!-- Menu + View buttons -->
    <rect x="-15" y="-25" width="10" height="7" rx="2" fill="#333"/>
    <rect x="5" y="-25" width="10" height="7" rx="2" fill="#333"/>
  </g>

  <!-- Xbox logo (top left) -->
  <g transform="translate(65,70)" filter="url(#glow)">
    <circle cx="0" cy="0" r="35" fill="#001a00" stroke="#107c10" stroke-width="2"/>
    <circle cx="0" cy="0" r="28" fill="#107c10" opacity="0.2"/>
    <line x1="-18" y1="-18" x2="18" y2="18" stroke="#107c10" stroke-width="6" stroke-linecap="round"/>
    <line x1="18" y1="-18" x2="-18" y2="18" stroke="#107c10" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Text (left side) -->
  <text x="60" y="155" font-family="Arial Black, sans-serif" font-size="13" fill="#44ff44" letter-spacing="4" filter="url(#glow)">TRUE NEXT-GEN POWER</text>
  <text x="55" y="200" font-family="Arial Black, sans-serif" font-size="34" font-weight="900" fill="white">XBOX SERIES</text>
  <text x="55" y="255" font-family="Arial Black, sans-serif" font-size="62" font-weight="900" fill="#107c10" filter="url(#glow)">X</text>

  <!-- Price tag -->
  <rect x="50" y="285" width="215" height="48" rx="10" fill="#001a00" opacity="0.6"/>
  <text x="60" y="310" font-family="Arial Black, sans-serif" font-size="11" fill="#44ff44" letter-spacing="2">FROM</text>
  <text x="60" y="325" font-family="Arial Black, sans-serif" font-size="16" font-weight="900" fill="white">KSh 56,000</text>

  <!-- Features -->
  <circle cx="55" cy="358" r="3" fill="#107c10"/>
  <text x="65" y="363" font-family="Arial, sans-serif" font-size="11" fill="#aaccaa">4K 120fps · Xbox Velocity Architecture</text>
  <circle cx="55" cy="378" r="3" fill="#107c10"/>
  <text x="65" y="383" font-family="Arial, sans-serif" font-size="11" fill="#aaccaa">Xbox Game Pass Ultimate Ready</text>
  <circle cx="55" cy="398" r="3" fill="#107c10"/>
  <text x="65" y="403" font-family="Arial, sans-serif" font-size="11" fill="#aaccaa">Quick Resume · Auto HDR</text>

  <!-- Bottom glow line -->
  <line x1="0" y1="490" x2="600" y2="490" stroke="#107c10" stroke-width="3" opacity="0.4" filter="url(#glow)"/>
</svg>
