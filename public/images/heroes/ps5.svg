<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001133"/>
      <stop offset="50%" style="stop-color:#002266"/>
      <stop offset="100%" style="stop-color:#001133"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0044cc;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#001133;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="console_body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0f0"/>
      <stop offset="50%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e0e0"/>
    </linearGradient>
    <linearGradient id="console_center" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#333333"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softshadow">
      <feDropShadow dx="5" dy="10" stdDeviation="15" flood-color="#000033" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="500" fill="url(#bg)"/>
  <rect width="600" height="500" fill="url(#glow)"/>

  <!-- Background circuit pattern -->
  <g stroke="#0033aa" stroke-width="0.5" fill="none" opacity="0.1">
    <line x1="0" y1="100" x2="600" y2="100"/>
    <line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/>
  </g>

  <!-- PS5 Console illustration -->
  <g transform="translate(380, 250)" filter="url(#softshadow)">
    <!-- Left wing of PS5 (curved white panel) -->
    <path d="M-80,80 Q-130,60 -140,-10 Q-145,-60 -110,-100 Q-80,-130 -40,-140 L-40,-60 Q-60,-40 -65,-5 Q-65,35 -50,60 Z" fill="url(#console_body)"/>
    <!-- Right wing of PS5 (curved white panel) -->
    <path d="M80,80 Q130,60 140,-10 Q145,-60 110,-100 Q80,-130 40,-140 L40,-60 Q60,-40 65,-5 Q65,35 50,60 Z" fill="url(#console_body)"/>

    <!-- Center core (black) -->
    <rect x="-40" y="-140" width="80" height="225" rx="5" fill="url(#console_center)"/>

    <!-- Disc drive (left slightly) -->
    <rect x="-65" y="-20" width="30" height="70" rx="3" fill="#2a2a2a"/>
    <rect x="-63" y="5" width="26" height="2" fill="#444"/>
    <rect x="-63" y="12" width="26" height="1" fill="#555"/>
    <rect x="-63" y="18" width="26" height="1" fill="#555"/>

    <!-- USB and ports -->
    <rect x="-35" y="55" width="12" height="6" rx="2" fill="#333"/>
    <rect x="-18" y="55" width="12" height="6" rx="2" fill="#222"/>
    <rect x="12" y="55" width="10" height="6" rx="2" fill="#333"/>

    <!-- PS button (center bottom) -->
    <circle cx="0" cy="75" r="12" fill="#1a1a1a" stroke="#0044cc" stroke-width="1.5"/>
    <circle cx="0" cy="75" r="8" fill="#0044cc" opacity="0.7" filter="url(#glow2)"/>
    <!-- PS logo symbol -->
    <rect x="-4" y="69" width="5" height="12" rx="1" fill="white"/>
    <rect x="-4" y="69" width="7" height="5" rx="2" fill="white"/>

    <!-- LED strip (blue glow) -->
    <line x1="-40" y1="-5" x2="-40" y2="50" stroke="#0088ff" stroke-width="2" opacity="0.8" filter="url(#glow2)"/>
    <line x1="40" y1="-5" x2="40" y2="50" stroke="#0088ff" stroke-width="2" opacity="0.8" filter="url(#glow2)"/>

    <!-- DualSense controller shadow below -->
    <ellipse cx="0" cy="200" rx="90" ry="15" fill="#000033" opacity="0.3"/>
  </g>

  <!-- DualSense controller (smaller, to the left) -->
  <g transform="translate(180, 320)" filter="url(#softshadow)">
    <!-- Controller body -->
    <path d="M-70,0 Q-80,-30 -60,-55 Q-40,-75 0,-80 Q40,-75 60,-55 Q80,-30 70,0 Q65,30 50,55 Q35,75 10,80 Q-10,80 -30,75 Q-55,65 -70,0 Z" fill="#1a1a1a"/>
    <!-- White wings/handles -->
    <path d="M-70,0 Q-80,-30 -60,-55 L-40,-40 Q-55,-20 -50,10 Q-45,30 -35,45 Z" fill="#eeeeee"/>
    <path d="M70,0 Q80,-30 60,-55 L40,-40 Q55,-20 50,10 Q45,30 35,45 Z" fill="#eeeeee"/>
    <!-- Screen/touchpad -->
    <rect x="-22" y="-15" width="44" height="28" rx="8" fill="#222"/>
    <!-- Buttons (right side) -->
    <circle cx="42" cy="-30" r="7" fill="#1a1a1a"/>
    <text x="42" y="-26" text-anchor="middle" font-size="8" fill="#ff4488">○</text>
    <circle cx="55" cy="-42" r="7" fill="#1a1a1a"/>
    <text x="55" y="-38" text-anchor="middle" font-size="7" fill="#4488ff">✕</text>
    <circle cx="42" cy="-54" r="7" fill="#1a1a1a"/>
    <text x="42" y="-50" text-anchor="middle" font-size="8" fill="#44cc88">▲</text>
    <circle cx="29" cy="-42" r="7" fill="#1a1a1a"/>
    <text x="29" y="-38" text-anchor="middle" font-size="8" fill="#dd44aa">■</text>
    <!-- D-pad (left side) -->
    <circle cx="-42" cy="-42" r="14" fill="#222"/>
    <rect x="-46" y="-52" width="8" height="8" rx="2" fill="#444"/>
    <rect x="-46" y="-36" width="8" height="8" rx="2" fill="#444"/>
    <rect x="-52" y="-46" width="8" height="8" rx="2" fill="#444"/>
    <rect x="-38" y="-46" width="8" height="8" rx="2" fill="#444"/>
    <!-- Analog sticks -->
    <circle cx="-22" cy="8" r="12" fill="#333"/>
    <circle cx="-22" cy="8" r="8" fill="#444"/>
    <circle cx="22" cy="8" r="12" fill="#333"/>
    <circle cx="22" cy="8" r="8" fill="#444"/>
    <!-- PS button center -->
    <circle cx="0" cy="-30" r="7" fill="#1a1a1a" stroke="#0044cc" stroke-width="1"/>
  </g>

  <!-- PS logo emblem (top left) -->
  <g transform="translate(60,70)">
    <circle cx="0" cy="0" r="35" fill="#003399" opacity="0.3" filter="url(#glow2)"/>
    <rect x="-8" y="-22" width="16" height="44" rx="3" fill="white"/>
    <rect x="-8" y="-22" width="22" height="16" rx="7" fill="white"/>
    <rect x="-8" y="-22" width="14" height="9" rx="4" fill="#003399"/>
  </g>

  <!-- Text content (left side) -->
  <text x="60" y="155" font-family="Arial Black, sans-serif" font-size="13" fill="#88aaff" letter-spacing="4">NEXT-GEN GAMING</text>
  <text x="55" y="200" font-family="Arial Black, sans-serif" font-size="38" font-weight="900" fill="white">PlayStation</text>
  <text x="55" y="252" font-family="Arial Black, sans-serif" font-size="62" font-weight="900" fill="#0066ff" filter="url(#glow2)">5</text>

  <!-- Price tag -->
  <rect x="50" y="285" width="200" height="48" rx="10" fill="#003399" opacity="0.5"/>
  <text x="60" y="311" font-family="Arial Black, sans-serif" font-size="11" fill="#88aaff" letter-spacing="2">FROM</text>
  <text x="60" y="325" font-family="Arial Black, sans-serif" font-size="16" font-weight="900" fill="white">KSh 65,000</text>

  <!-- Feature bullets -->
  <circle cx="55" cy="358" r="3" fill="#0066ff"/>
  <text x="65" y="363" font-family="Arial, sans-serif" font-size="11" fill="#aaaacc">4K Gaming · Ray Tracing · 120fps</text>
  <circle cx="55" cy="378" r="3" fill="#0066ff"/>
  <text x="65" y="383" font-family="Arial, sans-serif" font-size="11" fill="#aaaacc">DualSense Haptic Feedback</text>
  <circle cx="55" cy="398" r="3" fill="#0066ff"/>
  <text x="65" y="403" font-family="Arial, sans-serif" font-size="11" fill="#aaaacc">Ultra-High Speed SSD</text>

  <!-- Bottom glow line -->
  <line x1="0" y1="490" x2="600" y2="490" stroke="#0044cc" stroke-width="3" opacity="0.4" filter="url(#glow2)"/>
  <line x1="0" y1="495" x2="600" y2="495" stroke="#0066ff" stroke-width="1" opacity="0.3"/>
</svg>
