<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <defs>
<linearGradient id="luxSheen" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
  <stop offset="40%" stop-color="#ffffff" stop-opacity="0.04"/>
  <stop offset="100%" stop-color="#000000" stop-opacity="0.06"/>
</linearGradient>
<radialGradient id="luxVignette" cx="50%" cy="45%" r="75%">
  <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
  <stop offset="100%" stop-color="#000000" stop-opacity="0.28"/>
</radialGradient>
<filter id="luxGrain">
  <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="7" stitchTiles="stitch"/>
  <feColorMatrix type="saturate" values="0"/>
  <feComponentTransfer>
    <feFuncA type="table" tableValues="0 0.045"/>
  </feComponentTransfer>
</filter>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0015"/>
      <stop offset="50%" style="stop-color:#0d001a"/>
      <stop offset="100%" style="stop-color:#050010"/>
    </linearGradient>
    <radialGradient id="glow_bg" cx="60%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#cc0000;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0a0015;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="screen_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1155cc"/>
      <stop offset="30%" style="stop-color:#2266dd"/>
      <stop offset="100%" style="stop-color:#0033aa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="3" dy="8" stdDeviation="12" flood-color="#000015" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="500" fill="url(#bg)"/>
  <rect width="600" height="500" fill="url(#glow_bg)"/>

  <!-- Colorful confetti-like circles in background -->
  <circle cx="80" cy="60" r="25" fill="#cc0000" opacity="0.08"/>
  <circle cx="150" cy="80" r="18" fill="#0066cc" opacity="0.1"/>
  <circle cx="500" cy="50" r="30" fill="#cc0000" opacity="0.08"/>
  <circle cx="550" cy="120" r="20" fill="#0066cc" opacity="0.08"/>
  <circle cx="520" cy="420" r="22" fill="#ffcc00" opacity="0.06"/>

  <!-- Nintendo Switch OLED illustration -->
  <g transform="translate(380, 240)" filter="url(#shadow)">
    <!-- Left Joy-Con (Red) -->
    <rect x="-160" y="-110" width="45" height="220" rx="20" fill="#cc0000"/>
    <!-- Left Joy-Con details -->
    <circle cx="-148" cy="-70" r="12" fill="#aa0000"/>
    <circle cx="-148" cy="-70" r="8" fill="#880000"/>
    <circle cx="-148" cy="-50" r="8" fill="#aa0000"/>
    <circle cx="-162" cy="-50" r="8" fill="#aa0000"/>
    <circle cx="-148" cy="-65" r="8" fill="#aa0000"/>
    <circle cx="-148" cy="-35" r="8" fill="#aa0000"/>
    <!-- D-pad buttons (red controller) -->
    <rect x="-158" y="-30" width="8" height="22" rx="3" fill="#bb0000"/>
    <rect x="-165" y="-23" width="22" height="8" rx="3" fill="#bb0000"/>
    <!-- Analog stick -->
    <circle cx="-138" cy="-80" r="12" fill="#cc1100"/>
    <circle cx="-138" cy="-80" r="8" fill="#aa0000"/>
    <!-- SR/SL buttons -->
    <rect x="-118" y="-85" width="4" height="18" rx="2" fill="#dd2222"/>
    <rect x="-118" y="-55" width="4" height="18" rx="2" fill="#dd2222"/>
    <!-- Rail (connector) -->
    <rect x="-115" y="-108" width="8" height="215" rx="0" fill="#222"/>
    <!-- Logo on joycon -->
    <text x="-148" y="0" text-anchor="middle" font-size="11" fill="#ff4444" font-weight="bold">L</text>

    <!-- Main console body -->
    <rect x="-108" y="-115" width="216" height="230" rx="8" fill="#1a1a1a"/>
    <!-- OLED Screen -->
    <rect x="-100" y="-108" width="200" height="215" rx="5" fill="url(#screen_grad)"/>
    <!-- Screen content (game on screen) -->
    <rect x="-100" y="-108" width="200" height="215" rx="5" fill="#0044cc"/>
    <!-- On screen: game scene simplified -->
    <rect x="-100" y="-108" width="200" height="105" rx="5" fill="#1166ff"/>
    <rect x="-100" y="-3" width="200" height="110" rx="0" fill="#2244aa"/>
    <rect x="-100" y="105" width="200" height="2" rx="0" fill="#1144cc"/>
    <!-- On-screen landscape elements -->
    <ellipse cx="0" cy="20" rx="80" ry="30" fill="#1166cc" opacity="0.5"/>
    <ellipse cx="-60" cy="30" rx="40" ry="60" fill="#0a3388" opacity="0.6"/>
    <ellipse cx="60" cy="25" rx="35" ry="55" fill="#0a3388" opacity="0.6"/>
    <!-- Nintendo character simplified on screen -->
    <circle cx="0" cy="-30" r="20" fill="#ff4444"/>
    <text x="0" y="-25" text-anchor="middle" font-size="14" font-weight="bold" fill="white">M</text>
    <rect x="-12" y="-10" width="24" height="18" rx="4" fill="#cc0000"/>
    <!-- Screen shine/glare -->
    <path d="M-100,-108 L-60,-108 L-100,-70 Z" fill="white" opacity="0.05"/>
    <!-- Screen border -->
    <rect x="-100" y="-108" width="200" height="215" rx="5" fill="none" stroke="#333" stroke-width="2"/>

    <!-- Home button -->
    <circle cx="0" cy="120" r="9" fill="#333"/>
    <circle cx="0" cy="120" r="6" fill="#444"/>
    <!-- Screenshot button -->
    <rect x="-30" y="115" width="14" height="9" rx="3" fill="#333"/>

    <!-- Right Joy-Con (Blue) -->
    <rect x="115" y="-110" width="45" height="220" rx="20" fill="#0066cc"/>
    <!-- Rail connector right -->
    <rect x="108" y="-108" width="8" height="215" rx="0" fill="#222"/>
    <!-- Right Joy-Con buttons -->
    <circle cx="138" cy="-62" r="8" fill="#0055bb"/>
    <text x="138" y="-58" text-anchor="middle" font-size="8" fill="#ff4488">A</text>
    <circle cx="150" cy="-74" r="8" fill="#0055bb"/>
    <text x="150" y="-70" text-anchor="middle" font-size="8" fill="#ffaa00">B</text>
    <circle cx="138" cy="-86" r="8" fill="#0055bb"/>
    <text x="138" y="-82" text-anchor="middle" font-size="7" fill="#44ff88">X</text>
    <circle cx="126" cy="-74" r="8" fill="#0055bb"/>
    <text x="126" y="-70" text-anchor="middle" font-size="8" fill="#4488ff">Y</text>
    <!-- Right analog stick -->
    <circle cx="142" cy="-40" r="12" fill="#0055aa"/>
    <circle cx="142" cy="-40" r="8" fill="#0044aa"/>
    <!-- SR/SL buttons right -->
    <rect x="115" y="-85" width="4" height="18" rx="2" fill="#0077dd"/>
    <rect x="115" y="-55" width="4" height="18" rx="2" fill="#0077dd"/>
    <!-- Plus button -->
    <rect x="130" y="-25" width="14" height="9" rx="3" fill="#0055bb"/>
    <!-- Home button right -->
    <circle cx="155" cy="-20" r="7" fill="#0055bb"/>
    <!-- Charge port on right joycon -->
    <text x="142" y="5" text-anchor="middle" font-size="11" fill="#4488ff" font-weight="bold">R</text>
  </g>

  <!-- Nintendo Switch wordmark/logo area -->
  <g transform="translate(65,70)">
    <rect x="-5" y="-10" width="38" height="38" rx="8" fill="#cc0000"/>
    <rect x="-5" y="-10" width="38" height="38" rx="8" fill="none" stroke="#ee2222" stroke-width="1"/>
    <!-- Nintendo N -->
    <text x="14" y="20" text-anchor="middle" font-size="22" font-weight="900" fill="white" font-family="Arial Black">N</text>
  </g>

  <!-- Text content (left side) -->
  <text x="60" y="155" font-family="Arial Black, sans-serif" font-size="12" fill="#ff6666" letter-spacing="4">PLAY ANYWHERE</text>
  <text x="55" y="200" font-family="Arial Black, sans-serif" font-size="30" font-weight="900" fill="white">Nintendo</text>
  <text x="55" y="248" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="#cc0000">Switch OLED</text>

  <!-- Price tag -->
  <rect x="50" y="268" width="218" height="48" rx="10" fill="#1a0000" opacity="0.6"/>
  <text x="60" y="293" font-family="Arial Black, sans-serif" font-size="11" fill="#ff6666" letter-spacing="2">FROM</text>
  <text x="60" y="308" font-family="Arial Black, sans-serif" font-size="16" font-weight="900" fill="white">KSh 45,000</text>

  <!-- Features -->
  <circle cx="55" cy="345" r="3" fill="#cc0000"/>
  <text x="65" y="350" font-family="Arial, sans-serif" font-size="11" fill="#cc9999">7" OLED Display · Vivid Colors</text>
  <circle cx="55" cy="368" r="3" fill="#cc0000"/>
  <text x="65" y="373" font-family="Arial, sans-serif" font-size="11" fill="#cc9999">Play at Home or On the Go</text>
  <circle cx="55" cy="391" r="3" fill="#cc0000"/>
  <text x="65" y="396" font-family="Arial, sans-serif" font-size="11" fill="#cc9999">Red &amp; Blue Joy-Con Included</text>
  <circle cx="55" cy="414" r="3" fill="#cc0000"/>
  <text x="65" y="419" font-family="Arial, sans-serif" font-size="11" fill="#cc9999">Wired LAN Port · 64GB Storage</text>

  <!-- Bottom line -->
  <line x1="0" y1="490" x2="600" y2="490" stroke="#cc0000" stroke-width="3" opacity="0.4" filter="url(#glow)"/>
<rect data-lux-overlay="true" x="0" y="0" width="100%" height="100%" fill="url(#luxSheen)" opacity="0.22"/>
<rect x="0" y="0" width="100%" height="100%" fill="url(#luxVignette)" opacity="0.32"/>
<rect x="0" y="0" width="100%" height="100%" filter="url(#luxGrain)" opacity="0.24"/>
</svg>
