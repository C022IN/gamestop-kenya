<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <defs>
<linearGradient id="luxSheen" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
  <stop offset="40%" stop-color="#ffffff" stop-opacity="0.04"/>
  <stop offset="100%" stop-color="#000000" stop-opacity="0.06"/>
</linearGradient>
<radialGradient id="luxVignette" cx="50%" cy="45%" r="75%">
  <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
  <stop offset="100%" stop-color="#000000" stop-opacity="0.28"/>
</radialGradient>
<filter id="luxGrain">
  <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="7" stitchTiles="stitch"/>
  <feColorMatrix type="saturate" values="0"/>
  <feComponentTransfer>
    <feFuncA type="table" tableValues="0 0.045"/>
  </feComponentTransfer>
</filter>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0020"/>
      <stop offset="50%" style="stop-color:#1a0035"/>
      <stop offset="100%" style="stop-color:#050010"/>
    </linearGradient>
    <radialGradient id="glow_center" cx="65%" cy="50%" r="45%">
      <stop offset="0%" style="stop-color:#8800ff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#0d0020;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="tv_screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111133"/>
      <stop offset="100%" style="stop-color:#0a0a22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="15" flood-color="#000010" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="500" fill="url(#bg)"/>
  <rect width="600" height="500" fill="url(#glow_center)"/>

  <!-- Stars in background -->
  <circle cx="30" cy="30" r="1.5" fill="#aa88ff" opacity="0.6"/>
  <circle cx="80" cy="50" r="1" fill="white" opacity="0.5"/>
  <circle cx="120" cy="25" r="2" fill="#aa88ff" opacity="0.5"/>
  <circle cx="50" cy="420" r="1" fill="white" opacity="0.4"/>
  <circle cx="100" cy="450" r="1.5" fill="#aa88ff" opacity="0.5"/>

  <!-- TV/Monitor illustration -->
  <g transform="translate(400, 240)" filter="url(#shadow)">
    <!-- TV outer frame -->
    <rect x="-145" y="-115" width="290" height="230" rx="18" fill="#1a1a2a"/>
    <!-- Screen bezel -->
    <rect x="-135" y="-105" width="270" height="210" rx="12" fill="#111122"/>
    <!-- Screen -->
    <rect x="-125" y="-95" width="250" height="190" rx="8" fill="url(#tv_screen)"/>

    <!-- Mini channel thumbnails on screen (3x3 grid) -->
    <!-- Row 1 -->
    <rect x="-118" y="-88" width="75" height="55" rx="4" fill="#1a3366"/>
    <rect x="-35" y="-88" width="75" height="55" rx="4" fill="#1a4420"/>
    <rect x="48" y="-88" width="75" height="55" rx="4" fill="#331a00"/>

    <!-- Row 2 -->
    <rect x="-118" y="-26" width="75" height="55" rx="4" fill="#220033"/>
    <rect x="-35" y="-26" width="75" height="55" rx="4" fill="#001a33"/>
    <rect x="48" y="-26" width="75" height="55" rx="4" fill="#1a0022"/>

    <!-- Row 3 partial (cut off by screen) -->
    <rect x="-118" y="36" width="75" height="55" rx="4" fill="#002211"/>
    <rect x="-35" y="36" width="75" height="55" rx="4" fill="#110022"/>
    <rect x="48" y="36" width="75" height="55" rx="4" fill="#221100"/>

    <!-- Channel content (simplified icons on thumbnails) -->
    <!-- Sports channel -->
    <circle cx="-80" cy="-61" r="18" fill="#2255aa"/>
    <text x="-80" y="-56" text-anchor="middle" font-size="20" fill="white">⚽</text>
    <!-- Nature/Movies channel -->
    <ellipse cx="7" cy="-61" rx="15" ry="18" fill="#228822"/>
    <text x="7" y="-56" text-anchor="middle" font-size="14" fill="white">🌲</text>
    <!-- News channel -->
    <rect x="55" y="-82" width="62" height="45" rx="3" fill="#882222"/>
    <text x="86" y="-57" text-anchor="middle" font-size="9" fill="white" font-weight="bold">NEWS</text>
    <line x1="58" y1="-65" x2="113" y2="-65" stroke="#cc3333" stroke-width="2"/>
    <!-- Movie channel -->
    <rect x="-118" y="-19" width="75" height="48" rx="3" fill="#330044"/>
    <circle cx="-80" cy="5" r="18" fill="#550077" opacity="0.8"/>
    <text x="-80" y="10" text-anchor="middle" font-size="16" fill="white">🎬</text>
    <!-- Music channel -->
    <rect x="-35" y="-19" width="75" height="48" rx="3" fill="#001a33"/>
    <text x="7" y="10" text-anchor="middle" font-size="22" fill="#4488ff">♪</text>
    <!-- Kids channel -->
    <rect x="48" y="-19" width="75" height="48" rx="3" fill="#1a0022"/>
    <text x="86" y="10" text-anchor="middle" font-size="20" fill="#ff44ff">★</text>

    <!-- Live indicator on one channel -->
    <rect x="-115" y="-84" width="22" height="10" rx="3" fill="#cc0000"/>
    <text x="-104" y="-76" text-anchor="middle" font-size="7" fill="white" font-weight="bold">LIVE</text>

    <!-- 4K badge on another -->
    <rect x="90" y="-84" width="28" height="10" rx="3" fill="#0066cc"/>
    <text x="104" y="-76" text-anchor="middle" font-size="7" fill="white" font-weight="bold">4K</text>

    <!-- Highlighted/selected channel glow -->
    <rect x="-118" y="-88" width="75" height="55" rx="4" fill="none" stroke="#aa44ff" stroke-width="2" filter="url(#glow)"/>

    <!-- Screen glare -->
    <path d="M-125,-95 L-75,-95 L-125,-55 Z" fill="white" opacity="0.04"/>

    <!-- Channel count overlay at bottom of screen -->
    <rect x="-125" y="78" width="250" height="17" rx="0" fill="#000020" opacity="0.8"/>
    <text x="0" y="90" text-anchor="middle" font-size="10" fill="#aa88ff" letter-spacing="2" font-family="Arial">20,000+ CHANNELS · SPORTS · MOVIES · TV SHOWS</text>

    <!-- TV bottom stand -->
    <rect x="-20" y="115" width="40" height="15" rx="3" fill="#1a1a2a"/>
    <rect x="-40" y="128" width="80" height="8" rx="4" fill="#111122"/>
    <!-- TV stand shadow -->
    <ellipse cx="0" cy="140" rx="50" ry="6" fill="#000010" opacity="0.3"/>

    <!-- Power indicator -->
    <circle cx="120" cy="105" r="4" fill="#aa44ff" opacity="0.9" filter="url(#glow)"/>
  </g>

  <!-- Streaming icons / play buttons -->
  <g filter="url(#glow)">
    <circle cx="310" cy="80" r="15" fill="#aa44ff" opacity="0.7"/>
    <polygon points="306,74 306,86 318,80" fill="white"/>
    <circle cx="345" cy="65" r="10" fill="#8822ff" opacity="0.6"/>
    <polygon points="342,59 342,71 352,65" fill="white"/>
    <circle cx="330" cy="95" r="8" fill="#6600cc" opacity="0.5"/>
    <polygon points="327,90 327,100 335,95" fill="white"/>
  </g>

  <!-- Wifi/signal waves -->
  <g transform="translate(490, 80)" stroke="#aa44ff" fill="none" opacity="0.5" filter="url(#glow)">
    <path d="M-30,20 Q0,-10 30,20" stroke-width="2" stroke-linecap="round"/>
    <path d="M-20,10 Q0,-5 20,10" stroke-width="2" stroke-linecap="round"/>
    <path d="M-10,2 Q0,0 10,2" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="0" cy="25" r="3" fill="#aa44ff"/>
  </g>

  <!-- Text content (left) -->
  <text x="60" y="145" font-family="Arial Black, sans-serif" font-size="13" fill="#aa44ff" letter-spacing="3" filter="url(#glow)">STREAM EVERYTHING</text>
  <text x="55" y="192" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" fill="white">Premium</text>
  <text x="55" y="240" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="#aa44ff" filter="url(#glow)">IPTV</text>

  <!-- Channel count badge -->
  <rect x="55" y="258" width="195" height="38" rx="10" fill="#220044" opacity="0.7"/>
  <text x="65" y="276" font-family="Arial Black, sans-serif" font-size="11" fill="#cc88ff" letter-spacing="1">20,000+</text>
  <text x="65" y="290" font-family="Arial Black, sans-serif" font-size="11" fill="#aa66cc">Channels Worldwide</text>

  <!-- Price -->
  <text x="60" y="325" font-family="Arial Black, sans-serif" font-size="13" fill="#aa44ff" letter-spacing="1" filter="url(#glow)">FROM KSh 1,500 / month</text>

  <!-- Features -->
  <circle cx="55" cy="355" r="3" fill="#aa44ff"/>
  <text x="65" y="360" font-family="Arial, sans-serif" font-size="11" fill="#cc99ff">Sports · Movies · TV Shows · Kids</text>
  <circle cx="55" cy="375" r="3" fill="#aa44ff"/>
  <text x="65" y="380" font-family="Arial, sans-serif" font-size="11" fill="#cc99ff">HD · Full HD · 4K Streams</text>
  <circle cx="55" cy="395" r="3" fill="#aa44ff"/>
  <text x="65" y="400" font-family="Arial, sans-serif" font-size="11" fill="#cc99ff">All Devices · Instant Activation</text>
  <circle cx="55" cy="415" r="3" fill="#aa44ff"/>
  <text x="65" y="420" font-family="Arial, sans-serif" font-size="11" fill="#cc99ff">Kenya · Africa · Global Channels</text>

  <!-- Bottom line -->
  <line x1="0" y1="490" x2="600" y2="490" stroke="#8800ff" stroke-width="3" opacity="0.5" filter="url(#glow)"/>
<rect data-lux-overlay="true" x="0" y="0" width="100%" height="100%" fill="url(#luxSheen)" opacity="0.22"/>
<rect x="0" y="0" width="100%" height="100%" fill="url(#luxVignette)" opacity="0.32"/>
<rect x="0" y="0" width="100%" height="100%" filter="url(#luxGrain)" opacity="0.24"/>
</svg>
