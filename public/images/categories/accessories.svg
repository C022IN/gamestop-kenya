<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#100a05"/>
      <stop offset="100%" style="stop-color:#1a1205"/>
    </linearGradient>
    <linearGradient id="rgb" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff0000"/>
      <stop offset="25%" style="stop-color:#ffff00"/>
      <stop offset="50%" style="stop-color:#00ff00"/>
      <stop offset="75%" style="stop-color:#0088ff"/>
      <stop offset="100%" style="stop-color:#ff00ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="200" fill="url(#bg)"/>

  <!-- Gaming headset -->
  <g transform="translate(65,80)">
    <!-- Headband arc -->
    <path d="M-32,-30 Q-35,-58 0,-60 Q35,-58 32,-30" fill="none" stroke="#333" stroke-width="8" stroke-linecap="round"/>
    <path d="M-30,-30 Q-33,-55 0,-57 Q33,-55 30,-30" fill="none" stroke="#444" stroke-width="4"/>
    <!-- RGB strip on headband -->
    <path d="M-25,-35 Q-28,-50 0,-52 Q28,-50 25,-35" fill="none" stroke="url(#rgb)" stroke-width="2" opacity="0.8" filter="url(#glow)"/>
    <!-- Left ear cup -->
    <ellipse cx="-33" cy="-22" rx="14" ry="18" fill="#222"/>
    <ellipse cx="-33" cy="-22" rx="10" ry="14" fill="#111"/>
    <ellipse cx="-33" cy="-22" rx="6" ry="9" fill="#2a2a2a"/>
    <!-- Right ear cup -->
    <ellipse cx="33" cy="-22" rx="14" ry="18" fill="#222"/>
    <ellipse cx="33" cy="-22" rx="10" ry="14" fill="#111"/>
    <ellipse cx="33" cy="-22" rx="6" ry="9" fill="#2a2a2a"/>
    <!-- RGB ring on cups -->
    <ellipse cx="-33" cy="-22" rx="12" ry="16" fill="none" stroke="url(#rgb)" stroke-width="1.5" opacity="0.7" filter="url(#glow)"/>
    <ellipse cx="33" cy="-22" rx="12" ry="16" fill="none" stroke="url(#rgb)" stroke-width="1.5" opacity="0.7" filter="url(#glow)"/>
    <!-- Mic boom -->
    <path d="M-33,-30 Q-55,-25 -60,-15 L-55,-12" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"/>
    <ellipse cx="-57" cy="-12" rx="5" ry="7" fill="#222"/>
    <text x="0" y="25" text-anchor="middle" font-size="9" fill="#cc8844">HEADSET</text>
  </g>

  <!-- Gaming keyboard -->
  <g transform="translate(200,90)">
    <rect x="-65" y="-20" width="130" height="38" rx="5" fill="#111118"/>
    <!-- Key rows -->
    <rect x="-62" y="-17" width="124" height="10" rx="2" fill="#1a1a25"/>
    <rect x="-60" y="-4" width="120" height="10" rx="2" fill="#1a1a25"/>
    <rect x="-56" y="9" width="112" height="10" rx="2" fill="#1a1a25"/>
    <!-- RGB on keys -->
    <rect x="-62" y="-17" width="124" height="4" fill="url(#rgb)" opacity="0.7" filter="url(#glow)"/>
    <rect x="-60" y="-4" width="120" height="4" fill="url(#rgb)" opacity="0.6" filter="url(#glow)"/>
    <rect x="-56" y="9" width="112" height="4" fill="url(#rgb)" opacity="0.5" filter="url(#glow)"/>
    <text x="0" y="30" text-anchor="middle" font-size="9" fill="#cc8844">KEYBOARD</text>
  </g>

  <!-- Gaming mouse -->
  <g transform="translate(340,80)">
    <path d="M-18,-32 Q-20,-48 0,-50 Q20,-48 18,-32 Q20,-5 0,10 Q-20,-5 -18,-32 Z" fill="#111"/>
    <line x1="0" y1="-50" x2="0" y2="-8" stroke="#222" stroke-width="1.5"/>
    <!-- Scroll wheel -->
    <rect x="-5" y="-36" width="10" height="14" rx="4" fill="#333"/>
    <!-- Mouse RGB underglow -->
    <ellipse cx="0" cy="5" rx="14" ry="8" fill="url(#rgb)" opacity="0.5" filter="url(#glow)"/>
    <!-- Side buttons -->
    <rect x="-20" y="-20" width="5" height="8" rx="2" fill="#1a1a1a"/>
    <rect x="-20" y="-10" width="5" height="8" rx="2" fill="#1a1a1a"/>
    <text x="0" y="28" text-anchor="middle" font-size="9" fill="#cc8844">MOUSE</text>
  </g>

  <!-- Category label -->
  <rect x="0" y="155" width="400" height="45" fill="#0a0800" opacity="0.9"/>
  <text x="200" y="178" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="18" font-weight="900" fill="white" letter-spacing="2">ACCESSORIES</text>
  <text x="200" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#cc8844" letter-spacing="2">200+ ITEMS</text>
</svg>
