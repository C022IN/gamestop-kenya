<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
<linearGradient id="luxSheen" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
  <stop offset="40%" stop-color="#ffffff" stop-opacity="0.04"/>
  <stop offset="100%" stop-color="#000000" stop-opacity="0.06"/>
</linearGradient>
<radialGradient id="luxVignette" cx="50%" cy="45%" r="75%">
  <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
  <stop offset="100%" stop-color="#000000" stop-opacity="0.28"/>
</radialGradient>
<filter id="luxGrain">
  <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="7" stitchTiles="stitch"/>
  <feColorMatrix type="saturate" values="0"/>
  <feComponentTransfer>
    <feFuncA type="table" tableValues="0 0.045"/>
  </feComponentTransfer>
</filter>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050810"/>
      <stop offset="100%" style="stop-color:#0d1220"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="200" fill="url(#bg)"/>

  <!-- PS5 mini representation -->
  <g transform="translate(60,75)">
    <!-- PS5 white wings -->
    <path d="M-22,22 Q-35,16 -38,-3 Q-40,-17 -30,-28 Q-22,-36 -11,-38 L-11,-16 Q-17,-11 -18,-1 Q-18,10 -14,17Z" fill="#f0f0f0"/>
    <path d="M22,22 Q35,16 38,-3 Q40,-17 30,-28 Q22,-36 11,-38 L11,-16 Q17,-11 18,-1 Q18,10 14,17Z" fill="#f0f0f0"/>
    <!-- Center black -->
    <rect x="-11" y="-38" width="22" height="64" rx="2" fill="#1a1a1a"/>
    <!-- LED -->
    <line x1="-11" y1="0" x2="-11" y2="15" stroke="#0066ff" stroke-width="1.5" opacity="0.8" filter="url(#glow)"/>
    <!-- PS button -->
    <circle cx="0" cy="22" r="4" fill="#0044cc" opacity="0.8" filter="url(#glow)"/>
    <text x="60" y="55" text-anchor="middle" font-size="9" fill="#4488ff">PS5</text>
  </g>

  <!-- Xbox Series X mini -->
  <g transform="translate(160,75)">
    <rect x="-22" y="-42" width="44" height="88" rx="4" fill="#111111"/>
    <!-- Vent top -->
    <rect x="-20" y="-40" width="40" height="28" rx="3" fill="#0a0a0a"/>
    <g stroke="#222" stroke-width="0.8">
      <line x1="-18" y1="-35" x2="18" y2="-35"/>
      <line x1="-18" y1="-29" x2="18" y2="-29"/>
      <line x1="-18" y1="-23" x2="18" y2="-23"/>
    </g>
    <!-- Xbox button -->
    <circle cx="0" cy="-26" r="9" fill="#107c10" opacity="0.7" filter="url(#glow)"/>
    <line x1="-5" y1="-31" x2="5" y2="-21" stroke="#107c10" stroke-width="2.5" filter="url(#glow)"/>
    <line x1="5" y1="-31" x2="-5" y2="-21" stroke="#107c10" stroke-width="2.5" filter="url(#glow)"/>
    <!-- Disc slot -->
    <rect x="-12" y="5" width="24" height="3" rx="1" fill="#0a0a0a"/>
    <!-- Bottom RGB -->
    <rect x="-22" y="40" width="44" height="2" fill="#107c10" opacity="0.6" filter="url(#glow)"/>
    <text x="160" y="55" text-anchor="middle" font-size="9" fill="#44ff44">XBOX</text>
  </g>

  <!-- Nintendo Switch OLED mini -->
  <g transform="translate(265,75)">
    <!-- Screen -->
    <rect x="-32" y="-32" width="64" height="58" rx="4" fill="#0a0a15"/>
    <!-- Screen display -->
    <rect x="-28" y="-28" width="56" height="50" rx="3" fill="#1144cc"/>
    <!-- Zelda on screen mini -->
    <circle cx="0" cy="-8" r="8" fill="#ffcc00" opacity="0.7"/>
    <!-- Joy-Con L (red) -->
    <rect x="-45" y="-30" width="14" height="54" rx="6" fill="#cc0000"/>
    <rect x="-43" y="-30" width="10" height="54" rx="5" fill="#dd1111"/>
    <!-- Joy-Con R (blue) -->
    <rect x="31" y="-30" width="14" height="54" rx="6" fill="#0066cc"/>
    <rect x="31" y="-30" width="10" height="54" rx="5" fill="#0077dd"/>
    <!-- Home button -->
    <circle cx="0" cy="23" r="4" fill="#333"/>
    <text x="265" y="55" text-anchor="middle" font-size="9" fill="#ff4444">SWITCH</text>
  </g>

  <!-- Category label -->
  <rect x="0" y="155" width="400" height="45" fill="#000010" opacity="0.9"/>
  <text x="200" y="178" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="18" font-weight="900" fill="white" letter-spacing="2">CONSOLES</text>
  <text x="200" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6688cc" letter-spacing="2">50+ SYSTEMS</text>
<rect data-lux-overlay="true" x="0" y="0" width="100%" height="100%" fill="url(#luxSheen)" opacity="0.22"/>
<rect x="0" y="0" width="100%" height="100%" fill="url(#luxVignette)" opacity="0.32"/>
<rect x="0" y="0" width="100%" height="100%" filter="url(#luxGrain)" opacity="0.24"/>
</svg>
