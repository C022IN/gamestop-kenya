<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
<linearGradient id="luxSheen" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
  <stop offset="40%" stop-color="#ffffff" stop-opacity="0.04"/>
  <stop offset="100%" stop-color="#000000" stop-opacity="0.06"/>
</linearGradient>
<radialGradient id="luxVignette" cx="50%" cy="45%" r="75%">
  <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
  <stop offset="100%" stop-color="#000000" stop-opacity="0.28"/>
</radialGradient>
<filter id="luxGrain">
  <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="7" stitchTiles="stitch"/>
  <feColorMatrix type="saturate" values="0"/>
  <feComponentTransfer>
    <feFuncA type="table" tableValues="0 0.045"/>
  </feComponentTransfer>
</filter>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0000"/>
      <stop offset="50%" style="stop-color:#330005"/>
      <stop offset="100%" style="stop-color:#1a0005"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cc0010"/>
      <stop offset="50%" style="stop-color:#e60012"/>
      <stop offset="100%" style="stop-color:#aa0008"/>
    </linearGradient>
    <linearGradient id="cardwhite" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dddddd"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1a0000" flood-opacity="0.7"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="400" fill="url(#bg)"/>

  <!-- Background stars (Nintendo/game-like) -->
  <g opacity="0.12" fill="#ff6688">
    <text x="15" y="45" font-size="18">★</text>
    <text x="50" y="55" font-size="12">★</text>
    <text x="240" y="42" font-size="18">★</text>
    <text x="272" y="58" font-size="14">★</text>
    <text x="260" y="358" font-size="14">★</text>
    <text x="30" y="360" font-size="16">★</text>
  </g>

  <!-- eShop card - white side -->
  <rect x="20" y="105" width="260" height="168" rx="15" fill="url(#cardwhite)" filter="url(#shadow)"/>
  <!-- eShop card - red top -->
  <rect x="20" y="105" width="260" height="75" rx="15" fill="url(#card)"/>
  <rect x="20" y="160" width="260" height="20" rx="0" fill="url(#card)"/>
  <!-- Card divider -->
  <rect x="20" y="178" width="260" height="3" fill="#cc0010"/>

  <!-- Nintendo logo on red part -->
  <g transform="translate(150, 140)" filter="url(#glow)">
    <!-- N logo simplified -->
    <rect x="-45" y="-18" width="90" height="36" rx="8" fill="white"/>
    <text x="0" y="12" text-anchor="middle" font-family="Arial Black" font-size="22" font-weight="900" fill="#cc0010" letter-spacing="2">Nintendo</text>
  </g>

  <!-- eShop logo on white part -->
  <g transform="translate(150, 200)">
    <!-- Shopping bag icon -->
    <rect x="-25" y="-10" width="50" height="40" rx="5" fill="#e60012"/>
    <path d="M-15,-10 Q-15,-30 0,-30 Q15,-30 15,-10" fill="none" stroke="#e60012" stroke-width="4" stroke-linecap="round"/>
    <text x="0" y="20" text-anchor="middle" font-family="Arial Black" font-size="14" font-weight="900" fill="white">e</text>
    <text x="70" y="12" text-anchor="middle" font-family="Arial Black" font-size="18" font-weight="900" fill="#e60012">eShop</text>
  </g>

  <!-- Card value -->
  <text x="150" y="255" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="#e60012" filter="url(#glow)">KSh 1,500</text>
  <text x="150" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#554444" letter-spacing="2">NINTENDO ESHOP CREDIT</text>

  <!-- Scratch code area -->
  <rect x="40" y="282" width="220" height="50" rx="8" fill="#f0e0e0" opacity="0.8"/>
  <text x="150" y="301" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#996666" letter-spacing="3">SCRATCH TO REVEAL</text>
  <rect x="55" y="306" width="190" height="18" rx="3" fill="#ccbbbb" opacity="0.6"/>
  <text x="150" y="319" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#886666">XXXX-XXXX-XXXX-XXXX</text>

  <!-- Use on Nintendo eShop label -->
  <text x="150" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ff4466">● Buy games, DLC &amp; more on Switch</text>

  <!-- Title area -->
  <rect x="0" y="10" width="300" height="88" fill="#0a0000" opacity="0.9"/>
  <text x="150" y="38" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" fill="white" letter-spacing="2">NINTENDO</text>
  <text x="150" y="68" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="26" font-weight="900" fill="#e60012" letter-spacing="0" filter="url(#glow)">eSHOP</text>
  <text x="150" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#cc4444" letter-spacing="2">DIGITAL GIFT CARD</text>

  <!-- Bottom bar -->
  <rect x="0" y="360" width="300" height="40" fill="#0a0000" opacity="0.97"/>
  <rect x="10" y="367" width="72" height="26" rx="4" fill="#e60012"/>
  <text x="46" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">NINTENDO</text>
  <text x="235" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#e60012">DIGITAL</text>

  <!-- Border -->
  <rect x="0" y="0" width="300" height="400" fill="none" stroke="#e60012" stroke-width="2" opacity="0.6"/>
<rect data-lux-overlay="true" x="0" y="0" width="100%" height="100%" fill="url(#luxSheen)" opacity="0.22"/>
<rect x="0" y="0" width="100%" height="100%" fill="url(#luxVignette)" opacity="0.32"/>
<rect x="0" y="0" width="100%" height="100%" filter="url(#luxGrain)" opacity="0.24"/>
</svg>
