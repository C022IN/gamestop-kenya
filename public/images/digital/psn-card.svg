<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001a44"/>
      <stop offset="50%" style="stop-color:#003399"/>
      <stop offset="100%" style="stop-color:#001a44"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1155cc"/>
      <stop offset="40%" style="stop-color:#0044bb"/>
      <stop offset="100%" style="stop-color:#003399"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000033" flood-opacity="0.6"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="400" fill="url(#bg)"/>

  <!-- Background pattern dots -->
  <g opacity="0.08" fill="#4488ff">
    <circle cx="20" cy="40" r="3"/>
    <circle cx="60" cy="20" r="2"/>
    <circle cx="100" cy="50" r="3"/>
    <circle cx="140" cy="25" r="2"/>
    <circle cx="180" cy="45" r="3"/>
    <circle cx="220" cy="15" r="2"/>
    <circle cx="260" cy="40" r="3"/>
    <circle cx="290" cy="25" r="2"/>
    <circle cx="40" cy="80" r="2"/>
    <circle cx="80" cy="65" r="3"/>
    <circle cx="120" cy="85" r="2"/>
    <circle cx="160" cy="70" r="3"/>
    <circle cx="200" cy="90" r="2"/>
    <circle cx="240" cy="75" r="3"/>
    <circle cx="280" cy="88" r="2"/>
  </g>

  <!-- Gift card physical card -->
  <rect x="25" y="100" width="250" height="160" rx="15" fill="url(#card)" filter="url(#shadow)"/>
  <rect x="25" y="100" width="250" height="160" rx="15" fill="url(#shine)"/>
  <!-- Card stripe details -->
  <rect x="25" y="100" width="250" height="45" rx="15" fill="#2266dd" opacity="0.5"/>
  <rect x="25" y="140" width="250" height="5" fill="#1144bb" opacity="0.4"/>
  <!-- Magnetic stripe -->
  <rect x="25" y="190" width="250" height="22" rx="0" fill="#112244" opacity="0.8"/>
  <rect x="50" y="196" width="180" height="12" rx="2" fill="#1a3355" opacity="0.6"/>

  <!-- PS logo on card -->
  <g transform="translate(70, 155)" filter="url(#glow)">
    <!-- PlayStation P logo -->
    <rect x="-8" y="-25" width="16" height="50" rx="2" fill="white"/>
    <rect x="-8" y="-25" width="22" height="18" rx="8" fill="white"/>
    <rect x="-8" y="-25" width="16" height="10" rx="5" fill="#003399"/>
  </g>

  <!-- PSN Text on card -->
  <text x="108" y="145" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="white" letter-spacing="2">PSN</text>
  <text x="108" y="168" font-family="Arial, sans-serif" font-size="11" fill="#88aaff" letter-spacing="1">NETWORK CARD</text>

  <!-- Value on card -->
  <text x="150" y="230" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="30" font-weight="900" fill="white" filter="url(#glow)">KSh 2,000</text>
  <text x="150" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#aabbdd" letter-spacing="2">PLAYSTATION STORE CREDIT</text>

  <!-- Card scratch area -->
  <rect x="40" y="270" width="220" height="60" rx="8" fill="#112244" opacity="0.7"/>
  <rect x="44" y="274" width="212" height="52" rx="6" fill="#0a1a33" opacity="0.5"/>
  <text x="150" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#446688" letter-spacing="3">SCRATCH TO REVEAL CODE</text>
  <g opacity="0.4">
    <line x1="60" y1="305" x2="240" y2="305" stroke="#446688" stroke-width="12" stroke-dasharray="18,3"/>
  </g>
  <text x="150" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#446688">XXXX-XXXX-XXXX-XXXX</text>

  <!-- PS button symbols (top right) -->
  <g transform="translate(245, 130)" opacity="0.7">
    <circle cx="-20" cy="0" r="7" fill="none" stroke="#ff4488" stroke-width="1.5"/>
    <text x="-20" y="4" text-anchor="middle" font-size="8" fill="#ff4488">○</text>
    <text x="0" y="4" text-anchor="middle" font-size="8" fill="#4488ff">✕</text>
    <text x="-10" y="-10" text-anchor="middle" font-size="8" fill="#44cc88">▲</text>
    <text x="-10" y="14" text-anchor="middle" font-size="8" fill="#dd44aa">■</text>
  </g>

  <!-- Title area -->
  <rect x="0" y="10" width="300" height="85" fill="#000a20" opacity="0.85"/>
  <text x="150" y="42" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="16" font-weight="900" fill="white" letter-spacing="2">PLAYSTATION</text>
  <text x="150" y="68" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="20" font-weight="900" fill="#4488ff" letter-spacing="1">NETWORK CARD</text>
  <text x="150" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#aabbcc" letter-spacing="2">DIGITAL GIFT CARD</text>

  <!-- Stars/rating -->
  <text x="150" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4488ff" filter="url(#glow)">● INSTANT DELIVERY</text>
  <text x="150" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#668899">Valid for PlayStation Store purchases</text>

  <!-- Bottom bar -->
  <rect x="0" y="360" width="300" height="40" fill="#000a20" opacity="0.97"/>
  <rect x="10" y="367" width="90" height="26" rx="4" fill="#003791"/>
  <text x="55" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">PLAYSTATION</text>
  <text x="230" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#4488ff">DIGITAL</text>

  <!-- Border -->
  <rect x="0" y="0" width="300" height="400" fill="none" stroke="#2255cc" stroke-width="2" opacity="0.6"/>
</svg>
