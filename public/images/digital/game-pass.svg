<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001a00"/>
      <stop offset="50%" style="stop-color:#003300"/>
      <stop offset="100%" style="stop-color:#001500"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d7d12"/>
      <stop offset="50%" style="stop-color:#107c10"/>
      <stop offset="100%" style="stop-color:#0a6010"/>
    </linearGradient>
    <radialGradient id="xbox_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#22ff44;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#001a00;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000a00" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="400" fill="url(#bg)"/>
  <rect width="300" height="400" fill="url(#xbox_glow)"/>

  <!-- Background game grid -->
  <g opacity="0.06" fill="#44ff44">
    <rect x="10" y="45" width="35" height="25" rx="3"/>
    <rect x="52" y="45" width="35" height="25" rx="3"/>
    <rect x="94" y="45" width="35" height="25" rx="3"/>
    <rect x="136" y="45" width="35" height="25" rx="3"/>
    <rect x="178" y="45" width="35" height="25" rx="3"/>
    <rect x="220" y="45" width="35" height="25" rx="3"/>
    <rect x="262" y="45" width="35" height="25" rx="3"/>
    <rect x="10" y="76" width="35" height="25" rx="3"/>
    <rect x="52" y="76" width="35" height="25" rx="3"/>
    <rect x="94" y="76" width="35" height="25" rx="3"/>
  </g>

  <!-- Xbox Game Pass subscription card -->
  <rect x="20" y="105" width="260" height="165" rx="15" fill="url(#card)" filter="url(#shadow)"/>
  <!-- Card shine -->
  <rect x="20" y="105" width="260" height="80" rx="15" fill="#ffffff" opacity="0.08"/>
  <!-- Card bottom dark band -->
  <rect x="20" y="235" width="260" height="35" rx="15" fill="#065508" opacity="0.6"/>

  <!-- Xbox Logo (circle with X) -->
  <g transform="translate(75, 175)" filter="url(#glow)">
    <circle cx="0" cy="0" r="32" fill="#000000" opacity="0.3"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#107c10" stroke-width="3"/>
    <circle cx="0" cy="0" r="20" fill="#107c10" opacity="0.4"/>
    <!-- X shape -->
    <line x1="-14" y1="-14" x2="14" y2="14" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <line x1="14" y1="-14" x2="-14" y2="14" stroke="white" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Game Pass text on card -->
  <text x="120" y="153" font-family="Arial Black, sans-serif" font-size="15" font-weight="900" fill="white" letter-spacing="1">XBOX</text>
  <text x="120" y="172" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" fill="#88ff88">GAME PASS</text>
  <text x="120" y="189" font-family="Arial, sans-serif" font-size="10" fill="#aaffaa" letter-spacing="1">ULTIMATE</text>

  <!-- Duration badge on card -->
  <rect x="110" y="200" width="80" height="28" rx="14" fill="#000000" opacity="0.4"/>
  <text x="150" y="219" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" fill="white">3 MONTHS</text>

  <!-- Features strip -->
  <rect x="20" y="236" width="260" height="34" rx="0" fill="#054a05" opacity="0.9"/>
  <text x="150" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#88ff88" letter-spacing="2">100+ GAMES · EA PLAY · GOLD INCLUDED</text>
  <text x="150" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#aaffaa" letter-spacing="1">CLOUD GAMING · DAY ONE RELEASES</text>

  <!-- Value / Price -->
  <text x="150" y="300" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="#44ff44" filter="url(#glow)">KSh 4,500</text>
  <text x="150" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#44aa44" letter-spacing="2">SUBSCRIBE NOW</text>

  <!-- Game icons (mini placeholders) -->
  <g opacity="0.5">
    <rect x="50" y="335" width="22" height="16" rx="3" fill="#333"/>
    <rect x="78" y="335" width="22" height="16" rx="3" fill="#333"/>
    <rect x="106" y="335" width="22" height="16" rx="3" fill="#333"/>
    <rect x="134" y="335" width="22" height="16" rx="3" fill="#333"/>
    <rect x="162" y="335" width="22" height="16" rx="3" fill="#333"/>
    <rect x="190" y="335" width="22" height="16" rx="3" fill="#333"/>
    <rect x="218" y="335" width="22" height="16" rx="3" fill="#333"/>
  </g>
  <text x="150" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#446644">+ HUNDREDS MORE GAMES</text>

  <!-- Title area -->
  <rect x="0" y="10" width="300" height="88" fill="#000a00" opacity="0.9"/>
  <text x="150" y="40" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="14" font-weight="900" fill="#44ff44" letter-spacing="2" filter="url(#glow)">XBOX GAME PASS</text>
  <text x="150" y="68" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="white" letter-spacing="1">ULTIMATE</text>
  <text x="150" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#44aa44" letter-spacing="2">3 MONTH SUBSCRIPTION</text>

  <!-- Bottom bar -->
  <rect x="0" y="360" width="300" height="40" fill="#000a00" opacity="0.97"/>
  <rect x="10" y="367" width="52" height="26" rx="4" fill="#107c10"/>
  <text x="36" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">XBOX</text>
  <text x="230" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#44ff44">DIGITAL</text>

  <!-- Border -->
  <rect x="0" y="0" width="300" height="400" fill="none" stroke="#107c10" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
</svg>
