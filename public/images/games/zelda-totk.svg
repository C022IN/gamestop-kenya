<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
<linearGradient id="luxSheen" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
  <stop offset="40%" stop-color="#ffffff" stop-opacity="0.04"/>
  <stop offset="100%" stop-color="#000000" stop-opacity="0.06"/>
</linearGradient>
<radialGradient id="luxVignette" cx="50%" cy="45%" r="75%">
  <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
  <stop offset="100%" stop-color="#000000" stop-opacity="0.28"/>
</radialGradient>
<filter id="luxGrain">
  <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="7" stitchTiles="stitch"/>
  <feColorMatrix type="saturate" values="0"/>
  <feComponentTransfer>
    <feFuncA type="table" tableValues="0 0.045"/>
  </feComponentTransfer>
</filter>

    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a2a"/>
      <stop offset="30%" style="stop-color:#1a3a5a"/>
      <stop offset="60%" style="stop-color:#3a6a8a"/>
      <stop offset="100%" style="stop-color:#88aacc"/>
    </linearGradient>
    <linearGradient id="goldgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8860b"/>
      <stop offset="50%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#daa520"/>
    </linearGradient>
    <radialGradient id="triforceglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffdd00;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#ff8800;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="300" height="400" fill="url(#sky)"/>

  <!-- Stars -->
  <circle cx="20" cy="30" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="60" cy="15" r="1" fill="#ffffaa" opacity="0.8"/>
  <circle cx="95" cy="28" r="2" fill="white" opacity="0.7"/>
  <circle cx="140" cy="10" r="1.5" fill="#ffffaa" opacity="0.9"/>
  <circle cx="180" cy="22" r="1" fill="white" opacity="0.8"/>
  <circle cx="220" cy="12" r="1.5" fill="#ffffaa" opacity="0.9"/>
  <circle cx="260" cy="28" r="1" fill="white" opacity="0.7"/>
  <circle cx="285" cy="15" r="2" fill="#ffffaa" opacity="0.8"/>

  <!-- Floating islands -->
  <!-- Background island -->
  <ellipse cx="200" cy="180" rx="70" ry="25" fill="#334433" opacity="0.7"/>
  <ellipse cx="200" cy="178" rx="67" ry="20" fill="#44aa44" opacity="0.6"/>
  <rect x="170" y="155" width="8" height="25" fill="#336633" opacity="0.7"/>
  <rect x="185" y="148" width="8" height="32" fill="#336633" opacity="0.7"/>
  <rect x="200" y="152" width="8" height="28" fill="#336633" opacity="0.7"/>
  <rect x="215" y="160" width="8" height="20" fill="#336633" opacity="0.7"/>

  <!-- Main floating island (center) -->
  <ellipse cx="150" cy="270" rx="110" ry="35" fill="#2a3a18"/>
  <ellipse cx="150" cy="267" rx="108" ry="30" fill="#3a5a22"/>
  <ellipse cx="150" cy="264" rx="106" ry="25" fill="#55aa33"/>
  <!-- Island dirt bottom -->
  <path d="M40,270 Q80,300 150,305 Q220,300 260,270 Q240,285 200,288 Q150,295 100,288 Q60,283 40,270Z" fill="#5a4020"/>

  <!-- Temple/ruins on island -->
  <g fill="#8a7040" opacity="0.8">
    <rect x="110" y="230" width="80" height="35"/>
    <!-- Pillars -->
    <rect x="108" y="218" width="10" height="50"/>
    <rect x="122" y="222" width="8" height="45"/>
    <rect x="170" y="222" width="8" height="45"/>
    <rect x="182" y="218" width="10" height="50"/>
    <!-- Roof -->
    <polygon points="100,220 150,200 200,220" fill="#6a5530"/>
    <!-- Steps -->
    <rect x="120" y="263" width="60" height="7" rx="1" fill="#7a6035"/>
    <rect x="115" y="270" width="70" height="7" rx="1" fill="#6a5025"/>
  </g>
  <!-- Temple windows glow -->
  <rect x="135" y="230" width="12" height="18" rx="3" fill="#ffdd00" opacity="0.6" filter="url(#glow)"/>
  <rect x="153" y="230" width="12" height="18" rx="3" fill="#ffdd00" opacity="0.5" filter="url(#glow)"/>

  <!-- Triforce (floating, glowing above temple) -->
  <g transform="translate(150, 175)" filter="url(#glow)">
    <ellipse cx="0" cy="10" rx="35" ry="15" fill="url(#triforceglow)" opacity="0.6"/>
    <!-- Bottom left triangle -->
    <polygon points="-22,18 0,18 -11,-4" fill="url(#goldgrad)"/>
    <!-- Bottom right triangle -->
    <polygon points="0,18 22,18 11,-4" fill="url(#goldgrad)"/>
    <!-- Top triangle -->
    <polygon points="-11,-4 11,-4 0,-26" fill="url(#goldgrad)"/>
  </g>

  <!-- Link silhouette (tiny, on edge of island) -->
  <g transform="translate(90, 250)" fill="#2a4a2a">
    <!-- Body -->
    <rect x="-5" y="-30" width="10" height="20" rx="3"/>
    <!-- Head -->
    <circle cx="0" cy="-38" r="8"/>
    <!-- Hat -->
    <polygon points="-8,-43 0,-60 8,-43" fill="#2a5a2a"/>
    <!-- Cape -->
    <path d="M-5,-25 L-12,-5 L-3,-5 Z" fill="#3a2a1a"/>
    <!-- Sword held up -->
    <line x1="8" y1="-40" x2="16" y2="-65" stroke="#aaaacc" stroke-width="2"/>
    <rect x="5" y="-42" width="7" height="3" rx="1" fill="#8a6030"/>
  </g>

  <!-- Grass/foliage tufts on island -->
  <g fill="#66cc44" opacity="0.8">
    <ellipse cx="60" cy="263" rx="15" ry="6"/>
    <ellipse cx="240" cy="260" rx="12" ry="5"/>
    <ellipse cx="190" cy="265" rx="10" ry="4"/>
    <ellipse cx="78" cy="268" rx="8" ry="4"/>
  </g>

  <!-- Chain / roots hanging from island -->
  <path d="M80,275 Q75,285 78,295 Q82,305 79,315" stroke="#5a4020" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M130,278 Q128,290 132,300 Q135,310 132,322" stroke="#5a4020" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M175,278 Q178,290 175,302 Q172,312 175,322" stroke="#5a4020" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M220,274 Q225,285 222,295 Q219,305 222,315" stroke="#5a4020" stroke-width="3" fill="none" opacity="0.6"/>

  <!-- Ground far below (mist) -->
  <rect x="0" y="330" width="300" height="70" fill="#1a2a1a" opacity="0.6"/>
  <ellipse cx="150" cy="328" rx="180" ry="25" fill="#88aacc" opacity="0.15"/>

  <!-- Title area -->
  <rect x="0" y="10" width="300" height="95" fill="#000a18" opacity="0.85"/>
  <text x="150" y="32" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="8" fill="#aaccee" letter-spacing="4">THE LEGEND OF ZELDA</text>
  <text x="150" y="57" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="18" font-weight="900" fill="url(#goldgrad)" letter-spacing="0">TEARS OF THE</text>
  <text x="150" y="82" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="white" letter-spacing="0">KINGDOM</text>
  <line x1="30" y1="90" x2="270" y2="90" stroke="#b8860b" stroke-width="0.8" opacity="0.6"/>

  <!-- Bottom bar -->
  <rect x="0" y="360" width="300" height="40" fill="#000a18" opacity="0.97"/>
  <!-- Switch badge -->
  <rect x="10" y="367" width="72" height="26" rx="4" fill="#e60012"/>
  <text x="46" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">SWITCH</text>
  <!-- Rating -->
  <text x="195" y="383" text-anchor="middle" font-family="Arial" font-size="9" fill="#ffdd00">★★★★★</text>
  <text x="258" y="383" text-anchor="middle" font-family="Arial" font-size="9" fill="#aaa">4.9</text>

  <!-- Border -->
  <rect x="0" y="0" width="300" height="400" fill="none" stroke="#b8860b" stroke-width="2" opacity="0.5"/>
<rect data-lux-overlay="true" x="0" y="0" width="100%" height="100%" fill="url(#luxSheen)" opacity="0.22"/>
<rect x="0" y="0" width="100%" height="100%" fill="url(#luxVignette)" opacity="0.32"/>
<rect x="0" y="0" width="100%" height="100%" filter="url(#luxGrain)" opacity="0.24"/>
</svg>
