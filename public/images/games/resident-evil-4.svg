<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#050808"/>
      <stop offset="50%" style="stop-color:#0a1408"/>
      <stop offset="100%" style="stop-color:#050a05"/>
    </linearGradient>
    <radialGradient id="moonglow" cx="50%" cy="25%" r="30%">
      <stop offset="0%" style="stop-color:#aabb88;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#050808;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fogfilter">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="400" fill="url(#bg)"/>
  <rect width="300" height="400" fill="url(#moonglow)"/>

  <!-- Moon -->
  <circle cx="150" cy="75" r="38" fill="#c8cc99" opacity="0.2" filter="url(#glow)"/>
  <circle cx="150" cy="75" r="28" fill="#dde8aa" opacity="0.35" filter="url(#glow)"/>
  <circle cx="150" cy="75" r="18" fill="#eef5cc" opacity="0.5"/>
  <!-- Moon craters -->
  <circle cx="143" cy="68" r="4" fill="#c0cc88" opacity="0.5"/>
  <circle cx="158" cy="78" r="5" fill="#c0cc88" opacity="0.4"/>
  <circle cx="146" cy="82" r="3" fill="#c0cc88" opacity="0.4"/>

  <!-- Stars -->
  <circle cx="20" cy="30" r="1" fill="white" opacity="0.6"/>
  <circle cx="50" cy="15" r="1.5" fill="#ffffcc" opacity="0.7"/>
  <circle cx="90" cy="40" r="1" fill="white" opacity="0.5"/>
  <circle cx="210" cy="20" r="1.5" fill="#ffffcc" opacity="0.6"/>
  <circle cx="255" cy="35" r="1" fill="white" opacity="0.7"/>
  <circle cx="280" cy="15" r="1.5" fill="#ffffcc" opacity="0.5"/>

  <!-- Dead forest (bare trees) -->
  <!-- Left trees -->
  <g fill="#0a1408" stroke="#1a2a18" stroke-width="0.5">
    <!-- Tree 1 -->
    <rect x="10" y="130" width="8" height="150"/>
    <line x1="14" y1="150" x2="-5" y2="120" stroke="#0a1408" stroke-width="5"/>
    <line x1="14" y1="165" x2="-10" y2="145" stroke="#0a1408" stroke-width="4"/>
    <line x1="14" y1="180" x2="0" y2="160" stroke="#0a1408" stroke-width="3"/>
    <line x1="14" y1="150" x2="35" y2="125" stroke="#0a1408" stroke-width="5"/>
    <line x1="14" y1="162" x2="30" y2="148" stroke="#0a1408" stroke-width="4"/>
    <!-- Tree 2 -->
    <rect x="30" y="155" width="6" height="125"/>
    <line x1="33" y1="170" x2="15" y2="148" stroke="#0a1408" stroke-width="4"/>
    <line x1="33" y1="183" x2="20" y2="168" stroke="#0a1408" stroke-width="3"/>
    <line x1="33" y1="170" x2="50" y2="148" stroke="#0a1408" stroke-width="4"/>
  </g>
  <!-- Right trees -->
  <g fill="#0a1408">
    <!-- Tree 3 -->
    <rect x="255" y="140" width="8" height="140"/>
    <line x1="259" y1="158" x2="240" y2="130" stroke="#0a1408" stroke-width="5"/>
    <line x1="259" y1="172" x2="245" y2="155" stroke="#0a1408" stroke-width="4"/>
    <line x1="259" y1="158" x2="280" y2="128" stroke="#0a1408" stroke-width="5"/>
    <line x1="259" y1="170" x2="278" y2="152" stroke="#0a1408" stroke-width="4"/>
    <!-- Tree 4 -->
    <rect x="278" y="160" width="6" height="120"/>
    <line x1="281" y1="178" x2="263" y2="155" stroke="#0a1408" stroke-width="4"/>
    <line x1="281" y1="178" x2="300" y2="150" stroke="#0a1408" stroke-width="4"/>
    <line x1="281" y1="192" x2="268" y2="178" stroke="#0a1408" stroke-width="3"/>
  </g>

  <!-- Ground / road leading to castle -->
  <polygon points="80,400 100,280 200,280 220,400" fill="#0f1a0f"/>
  <polygon points="105,400 120,310 180,310 195,400" fill="#0a1208" opacity="0.7"/>
  <!-- Road edges -->
  <line x1="100" y1="280" x2="80" y2="400" stroke="#1a2a18" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="280" x2="220" y2="400" stroke="#1a2a18" stroke-width="1" opacity="0.5"/>

  <!-- Castle/Village silhouette -->
  <g fill="#06100a" opacity="0.9">
    <!-- Left buildings -->
    <rect x="15" y="200" width="35" height="130"/>
    <rect x="22" y="185" width="20" height="20"/>
    <polygon points="22,185 32,165 42,185" fill="#06100a"/>
    <!-- Cross on top -->
    <rect x="30" y="155" width="3" height="18" fill="#06100a"/>
    <rect x="26" y="163" width="11" height="3" fill="#06100a"/>

    <rect x="55" y="215" width="28" height="115"/>
    <polygon points="55,215 69,195 83,215" fill="#06100a"/>

    <!-- Central large structure (castle) -->
    <rect x="85" y="190" width="130" height="210"/>
    <!-- Tower left of castle -->
    <rect x="78" y="175" width="28" height="225"/>
    <polygon points="78,175 92,150 106,175" fill="#06100a"/>
    <!-- Tower right of castle -->
    <rect x="194" y="178" width="28" height="222"/>
    <polygon points="194,178 208,153 222,178" fill="#06100a"/>
    <!-- Castle parapet -->
    <rect x="85" y="185" width="12" height="10"/>
    <rect x="102" y="185" width="12" height="10"/>
    <rect x="119" y="185" width="12" height="10"/>
    <rect x="136" y="185" width="12" height="10"/>
    <rect x="153" y="185" width="12" height="10"/>
    <rect x="170" y="185" width="12" height="10"/>
    <rect x="187" y="185" width="8" height="10"/>
    <!-- Gate/door -->
    <path d="M135,310 Q150,295 165,310 L165,400 L135,400 Z" fill="#0a1808"/>

    <!-- Right buildings -->
    <rect x="222" y="200" width="35" height="130"/>
    <rect x="225" y="185" width="25" height="20"/>
    <polygon points="225,185 237,165 250,185" fill="#06100a"/>
    <rect x="258" y="218" width="22" height="112"/>
    <polygon points="258,218 269,198 280,218" fill="#06100a"/>
  </g>

  <!-- Castle windows (eerie yellow glow) -->
  <rect x="92" y="205" width="10" height="14" rx="3" fill="#88aa44" opacity="0.5" filter="url(#glow)"/>
  <rect x="115" y="200" width="10" height="14" rx="3" fill="#88aa44" opacity="0.4"/>
  <rect x="175" y="205" width="10" height="14" rx="3" fill="#88aa44" opacity="0.5" filter="url(#glow)"/>
  <rect x="195" y="200" width="10" height="14" rx="3" fill="#aacc66" opacity="0.45"/>
  <rect x="84" y="195" width="8" height="12" rx="2" fill="#88aa44" opacity="0.5" filter="url(#glow)"/>
  <rect x="202" y="198" width="8" height="12" rx="2" fill="#88aa44" opacity="0.5"/>
  <!-- Gate glow -->
  <path d="M136,312 Q150,298 164,312 L164,360 L136,360 Z" fill="#667733" opacity="0.2" filter="url(#glow)"/>

  <!-- Fog at ground -->
  <ellipse cx="150" cy="380" rx="160" ry="30" fill="#0a1a08" opacity="0.6" filter="url(#fogfilter)"/>
  <ellipse cx="150" cy="370" rx="140" ry="22" fill="#0d1e0a" opacity="0.5" filter="url(#fogfilter)"/>

  <!-- Title section -->
  <rect x="0" y="10" width="300" height="90" fill="#040808" opacity="0.9"/>
  <text x="150" y="35" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="12" font-weight="900" fill="#cc2200" letter-spacing="5" filter="url(#glow)">RESIDENT EVIL</text>
  <!-- Stylized 4 -->
  <text x="150" y="85" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="white" letter-spacing="-2">4</text>
  <!-- Red underline -->
  <rect x="110" y="86" width="80" height="3" fill="#cc0000" opacity="0.8"/>
  <text x="150" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#668844" letter-spacing="3">REMAKE</text>

  <!-- Bottom bar -->
  <rect x="0" y="360" width="300" height="40" fill="#030608" opacity="0.97"/>
  <!-- PS5 badge -->
  <rect x="10" y="367" width="52" height="26" rx="4" fill="#003791"/>
  <text x="36" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">PS5</text>
  <!-- Rating -->
  <text x="185" y="383" text-anchor="middle" font-family="Arial" font-size="9" fill="#ffdd00">★★★★★</text>
  <text x="248" y="383" text-anchor="middle" font-family="Arial" font-size="9" fill="#aaa">4.7</text>

  <!-- Border -->
  <rect x="0" y="0" width="300" height="400" fill="none" stroke="#336633" stroke-width="2" opacity="0.5"/>
</svg>
