<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
<linearGradient id="luxSheen" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
  <stop offset="40%" stop-color="#ffffff" stop-opacity="0.04"/>
  <stop offset="100%" stop-color="#000000" stop-opacity="0.06"/>
</linearGradient>
<radialGradient id="luxVignette" cx="50%" cy="45%" r="75%">
  <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
  <stop offset="100%" stop-color="#000000" stop-opacity="0.28"/>
</radialGradient>
<filter id="luxGrain">
  <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="7" stitchTiles="stitch"/>
  <feColorMatrix type="saturate" values="0"/>
  <feComponentTransfer>
    <feFuncA type="table" tableValues="0 0.045"/>
  </feComponentTransfer>
</filter>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001030"/>
      <stop offset="50%" style="stop-color:#002060"/>
      <stop offset="100%" style="stop-color:#003080"/>
    </linearGradient>
    <linearGradient id="field" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6a1a"/>
      <stop offset="100%" style="stop-color:#0a4a0a"/>
    </linearGradient>
    <radialGradient id="spotlights" cx="50%" cy="0%" r="70%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#001030;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="fieldclip">
      <rect x="0" y="200" width="300" height="200"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="300" height="400" fill="url(#bg)"/>
  <rect width="300" height="400" fill="url(#spotlights)"/>

  <!-- Stadium lights/flares -->
  <circle cx="20" cy="20" r="8" fill="#ffffff" opacity="0.4" filter="url(#glow)"/>
  <line x1="20" y1="20" x2="150" y2="230" stroke="white" stroke-width="0.5" opacity="0.05"/>
  <circle cx="280" cy="20" r="8" fill="#ffffff" opacity="0.4" filter="url(#glow)"/>
  <line x1="280" y1="20" x2="150" y2="230" stroke="white" stroke-width="0.5" opacity="0.05"/>

  <!-- Stadium crowd (blurred dots) -->
  <g opacity="0.4">
    <rect x="0" y="180" width="300" height="30" fill="#334466"/>
    <!-- Crowd pattern -->
    <circle cx="10" cy="190" r="4" fill="#4455aa"/>
    <circle cx="20" cy="187" r="4" fill="#cc4444"/>
    <circle cx="30" cy="192" r="4" fill="#ffffff"/>
    <circle cx="40" cy="188" r="4" fill="#44aa44"/>
    <circle cx="50" cy="191" r="4" fill="#aaaa44"/>
    <circle cx="60" cy="186" r="4" fill="#4444cc"/>
    <circle cx="70" cy="193" r="4" fill="#cc4488"/>
    <circle cx="80" cy="188" r="4" fill="#44aacc"/>
    <circle cx="90" cy="190" r="4" fill="#cc8844"/>
    <circle cx="100" cy="186" r="4" fill="#ffffff"/>
    <circle cx="110" cy="193" r="4" fill="#4488cc"/>
    <circle cx="120" cy="189" r="4" fill="#cc4444"/>
    <circle cx="130" cy="192" r="4" fill="#44cc44"/>
    <circle cx="140" cy="187" r="4" fill="#cccc44"/>
    <circle cx="150" cy="190" r="4" fill="#ffffff"/>
    <circle cx="160" cy="187" r="4" fill="#cc4444"/>
    <circle cx="170" cy="191" r="4" fill="#44cc88"/>
    <circle cx="180" cy="188" r="4" fill="#cc44cc"/>
    <circle cx="190" cy="193" r="4" fill="#4444cc"/>
    <circle cx="200" cy="187" r="4" fill="#cc8844"/>
    <circle cx="210" cy="190" r="4" fill="#ffffff"/>
    <circle cx="220" cy="186" r="4" fill="#44cccc"/>
    <circle cx="230" cy="192" r="4" fill="#cc4444"/>
    <circle cx="240" cy="188" r="4" fill="#44aa44"/>
    <circle cx="250" cy="191" r="4" fill="#8844cc"/>
    <circle cx="260" cy="187" r="4" fill="#cc8844"/>
    <circle cx="270" cy="190" r="4" fill="#4488cc"/>
    <circle cx="280" cy="193" r="4" fill="#ffffff"/>
    <circle cx="290" cy="188" r="4" fill="#cc4444"/>
  </g>

  <!-- Football field -->
  <rect x="0" y="200" width="300" height="200" fill="url(#field)"/>
  <!-- Field stripes (alternating slightly lighter) -->
  <rect x="0" y="200" width="300" height="25" fill="#1d7a1d" opacity="0.5"/>
  <rect x="0" y="250" width="300" height="25" fill="#1d7a1d" opacity="0.5"/>
  <rect x="0" y="300" width="300" height="25" fill="#1d7a1d" opacity="0.5"/>
  <rect x="0" y="350" width="300" height="25" fill="#1d7a1d" opacity="0.5"/>
  <!-- Field lines -->
  <line x1="0" y1="200" x2="300" y2="200" stroke="white" stroke-width="2" opacity="0.8"/>
  <line x1="150" y1="200" x2="150" y2="400" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <ellipse cx="150" cy="310" rx="55" ry="40" fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <circle cx="150" cy="310" r="4" fill="white" opacity="0.6"/>
  <!-- Corner arcs -->
  <path d="M0,200 Q15,200 15,215" fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <path d="M300,200 Q285,200 285,215" fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <!-- Penalty box -->
  <rect x="85" y="200" width="130" height="55" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <rect x="115" y="200" width="70" height="28" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>

  <!-- Soccer ball (3D-ish) -->
  <g transform="translate(150, 230)" filter="url(#glow)">
    <circle cx="0" cy="0" r="28" fill="white"/>
    <!-- Pentagons (black patches) -->
    <polygon points="0,-28 8,-22 5,-12 -5,-12 -8,-22" fill="black"/>
    <polygon points="0,-28 -8,-22 -15,-28 -18,-22 -8,-15" fill="black"/>
    <polygon points="0,-28 8,-22 18,-28 14,-22 5,-12" fill="black" opacity="0.0"/>
    <polygon points="-16,20 -10,12 -22,8 -26,18 -16,28" fill="black"/>
    <polygon points="16,20 10,12 22,8 26,18 16,28" fill="black"/>
    <polygon points="0,28 8,22 -8,22" fill="black" opacity="0.5"/>
    <!-- Shine -->
    <ellipse cx="-8" cy="-12" rx="8" ry="6" fill="white" opacity="0.5"/>
  </g>

  <!-- Player silhouette kicking -->
  <g transform="translate(185, 215)" fill="#001030">
    <!-- Body -->
    <rect x="-8" y="-35" width="16" height="28" rx="5"/>
    <!-- Head -->
    <circle cx="0" cy="-45" r="12"/>
    <!-- Arms -->
    <path d="M-8,-25 Q-25,-15 -30,-5" stroke="#001030" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M8,-25 Q20,-10 18,5" stroke="#001030" stroke-width="11" fill="none" stroke-linecap="round"/>
    <!-- Legs - kicking pose -->
    <path d="M-6,-7 Q-10,15 -12,30" stroke="#001030" stroke-width="13" fill="none" stroke-linecap="round"/>
    <path d="M6,-7 Q18,5 35,-5" stroke="#001030" stroke-width="13" fill="none" stroke-linecap="round"/>
    <!-- Jersey color - blue -->
    <rect x="-8" y="-35" width="16" height="28" rx="5" fill="#0044aa"/>
    <circle cx="0" cy="-45" r="12" fill="#ffcc00"/>
  </g>

  <!-- EA Sports branding -->
  <rect x="0" y="10" width="300" height="100" fill="#000020" opacity="0.85"/>
  <text x="150" y="37" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="12" font-weight="900" fill="#00aaff" letter-spacing="6">EA SPORTS</text>
  <text x="147" y="72" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="38" font-weight="900" fill="white" letter-spacing="3">FC</text>
  <text x="223" y="72" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="38" font-weight="900" fill="#00aaff" letter-spacing="0">25</text>
  <text x="150" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#aaaacc" letter-spacing="3">OFFICIAL VIDEO GAME</text>

  <!-- Bottom bar -->
  <rect x="0" y="360" width="300" height="40" fill="#000020" opacity="0.97"/>
  <!-- PS5 badge -->
  <rect x="10" y="367" width="52" height="26" rx="4" fill="#003791"/>
  <text x="36" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">PS5</text>
  <!-- Rating -->
  <text x="185" y="383" text-anchor="middle" font-family="Arial" font-size="9" fill="#ffdd00">★★★★☆</text>
  <text x="247" y="383" text-anchor="middle" font-family="Arial" font-size="9" fill="#aaa">4.3</text>

  <!-- Border -->
  <rect x="0" y="0" width="300" height="400" fill="none" stroke="#0055cc" stroke-width="2" opacity="0.6"/>
<rect data-lux-overlay="true" x="0" y="0" width="100%" height="100%" fill="url(#luxSheen)" opacity="0.22"/>
<rect x="0" y="0" width="100%" height="100%" fill="url(#luxVignette)" opacity="0.32"/>
<rect x="0" y="0" width="100%" height="100%" filter="url(#luxGrain)" opacity="0.24"/>
</svg>
