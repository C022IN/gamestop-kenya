<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050508"/>
      <stop offset="50%" style="stop-color:#0a0015"/>
      <stop offset="100%" style="stop-color:#000a05"/>
    </linearGradient>
    <linearGradient id="neon1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffee00;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#ffee00;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ffee00;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="400" fill="url(#bg)"/>

  <!-- City grid lines (perspective) -->
  <g stroke="#ffee00" stroke-width="0.3" opacity="0.08">
    <line x1="150" y1="200" x2="0" y2="400"/>
    <line x1="150" y1="200" x2="50" y2="400"/>
    <line x1="150" y1="200" x2="100" y2="400"/>
    <line x1="150" y1="200" x2="200" y2="400"/>
    <line x1="150" y1="200" x2="250" y2="400"/>
    <line x1="150" y1="200" x2="300" y2="400"/>
    <!-- Horizontal lines -->
    <line x1="0" y1="250" x2="300" y2="250"/>
    <line x1="0" y1="300" x2="300" y2="300"/>
    <line x1="0" y1="350" x2="300" y2="350"/>
  </g>

  <!-- City buildings (left) -->
  <rect x="0" y="100" width="35" height="300" fill="#0a0a15"/>
  <rect x="0" y="80" width="28" height="320" fill="#050510"/>
  <rect x="38" y="130" width="30" height="270" fill="#0a0a18"/>
  <rect x="0" y="100" width="35" height="300" fill="#0a0a15"/>
  <!-- Windows left buildings -->
  <rect x="5" y="105" width="5" height="4" fill="#ffee00" opacity="0.6" filter="url(#glow2)"/>
  <rect x="13" y="105" width="5" height="4" fill="#ffee00" opacity="0.4"/>
  <rect x="5" y="115" width="5" height="4" fill="#00ffee" opacity="0.5" filter="url(#glow2)"/>
  <rect x="13" y="115" width="5" height="4" fill="#ffee00" opacity="0.6"/>
  <rect x="5" y="125" width="5" height="4" fill="#ffee00" opacity="0.3"/>
  <rect x="13" y="125" width="5" height="4" fill="#00ffee" opacity="0.5"/>
  <rect x="5" y="140" width="5" height="4" fill="#ff00ff" opacity="0.5" filter="url(#glow2)"/>
  <rect x="13" y="140" width="5" height="4" fill="#ffee00" opacity="0.4"/>
  <rect x="42" y="140" width="5" height="4" fill="#ffee00" opacity="0.6"/>
  <rect x="50" y="140" width="5" height="4" fill="#ff00ff" opacity="0.5"/>
  <rect x="42" y="150" width="5" height="4" fill="#00ffee" opacity="0.4"/>
  <rect x="50" y="150" width="5" height="4" fill="#ffee00" opacity="0.6"/>

  <!-- City buildings (right) -->
  <rect x="235" y="90" width="65" height="310" fill="#0a0a15"/>
  <rect x="250" y="110" width="50" height="290" fill="#050510"/>
  <rect x="242" y="120" width="30" height="280" fill="#0a0a18"/>
  <!-- Windows right buildings -->
  <rect x="255" y="115" width="5" height="4" fill="#ffee00" opacity="0.6" filter="url(#glow2)"/>
  <rect x="263" y="115" width="5" height="4" fill="#00ffee" opacity="0.5"/>
  <rect x="255" y="125" width="5" height="4" fill="#ffee00" opacity="0.4"/>
  <rect x="263" y="125" width="5" height="4" fill="#ff00ff" opacity="0.5" filter="url(#glow2)"/>
  <rect x="255" y="140" width="5" height="4" fill="#ffee00" opacity="0.6"/>
  <rect x="263" y="140" width="5" height="4" fill="#00ffee" opacity="0.4"/>
  <rect x="255" y="155" width="5" height="4" fill="#ff00ff" opacity="0.4"/>
  <rect x="263" y="155" width="5" height="4" fill="#ffee00" opacity="0.6"/>
  <rect x="245" y="130" width="5" height="4" fill="#ffee00" opacity="0.5"/>
  <rect x="245" y="145" width="5" height="4" fill="#00ffee" opacity="0.4"/>

  <!-- Neon signs on buildings -->
  <rect x="5" y="180" width="28" height="8" rx="2" fill="#ff0066" opacity="0.9" filter="url(#glow2)"/>
  <text x="19" y="187" text-anchor="middle" font-size="5" fill="white" font-weight="bold">CORPO</text>
  <rect x="245" y="200" width="40" height="8" rx="2" fill="#00ffee" opacity="0.8" filter="url(#glow2)"/>
  <text x="265" y="207" text-anchor="middle" font-size="5" fill="#000" font-weight="bold">NIGHT CITY</text>

  <!-- V (main character) silhouette -->
  <g transform="translate(150,230)">
    <!-- Body silhouette -->
    <path d="M-22,0 L-25,-30 L-15,-65 L0,-80 L15,-65 L25,-30 L22,0 Z" fill="#0a0a15"/>
    <!-- Jacket/coat detail -->
    <path d="M-22,0 L-25,-30 L-15,-65 L-8,-70 L-10,-30 L-8,0 Z" fill="#111120"/>
    <path d="M22,0 L25,-30 L15,-65 L8,-70 L10,-30 L8,0 Z" fill="#111120"/>
    <!-- Legs -->
    <rect x="-18" y="0" width="14" height="50" rx="4" fill="#0a0a15"/>
    <rect x="4" y="0" width="14" height="50" rx="4" fill="#0a0a15"/>
    <!-- Boots with neon trim -->
    <rect x="-22" y="45" width="18" height="15" rx="4" fill="#0a0a15"/>
    <rect x="4" y="45" width="18" height="15" rx="4" fill="#0a0a15"/>
    <rect x="-22" y="45" width="18" height="3" fill="#ffee00" opacity="0.8" filter="url(#glow2)"/>
    <rect x="4" y="45" width="18" height="3" fill="#ffee00" opacity="0.8" filter="url(#glow2)"/>
    <!-- Arms -->
    <path d="M-25,-50 L-50,-30 L-45,-20" stroke="#0a0a15" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M25,-50 L50,-30 L45,-20" stroke="#0a0a15" stroke-width="14" fill="none" stroke-linecap="round"/>
    <!-- Cyber arm details -->
    <rect x="-55" y="-30" width="12" height="15" rx="3" fill="#ffee00" opacity="0.7" filter="url(#glow2)"/>
    <!-- Head -->
    <ellipse cx="0" cy="-90" rx="18" ry="22" fill="#0a0a15"/>
    <!-- Face details -->
    <rect x="-14" y="-100" rx="3" width="28" height="5" fill="#ffee00" opacity="0.6" filter="url(#glow2)"/>
    <!-- Eye glow -->
    <circle cx="-6" cy="-92" r="4" fill="#00ffee" opacity="0.8" filter="url(#glow2)"/>
    <circle cx="6" cy="-92" r="4" fill="#00ffee" opacity="0.8" filter="url(#glow2)"/>
    <!-- Neon jacket stripe -->
    <line x1="-8" y1="-65" x2="-8" y2="0" stroke="#ffee00" stroke-width="1.5" opacity="0.7" filter="url(#glow2)"/>
    <line x1="8" y1="-65" x2="8" y2="0" stroke="#ffee00" stroke-width="1.5" opacity="0.7" filter="url(#glow2)"/>
  </g>

  <!-- Ground glow -->
  <ellipse cx="150" cy="340" rx="100" ry="20" fill="#ffee00" opacity="0.08" filter="url(#glow3)"/>

  <!-- Neon horizontal bar -->
  <rect x="0" y="100" width="300" height="2" fill="url(#neon1)" opacity="0.4"/>
  <rect x="0" y="300" width="300" height="1" fill="url(#neon1)" opacity="0.3"/>

  <!-- Title section -->
  <rect x="0" y="10" width="300" height="88" fill="#000010" opacity="0.8"/>
  <text x="150" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="#ffee00" filter="url(#glow2)" letter-spacing="-1">CYBERPUNK</text>
  <text x="150" y="72" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="30" font-weight="900" fill="white" letter-spacing="2">2077</text>
  <text x="150" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ffee00" letter-spacing="4" opacity="0.8">ULTIMATE EDITION</text>

  <!-- Bottom bar -->
  <rect x="0" y="360" width="300" height="40" fill="#000010" opacity="0.97"/>
  <!-- PC badge -->
  <rect x="10" y="367" width="40" height="26" rx="4" fill="#374151"/>
  <text x="30" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">PC</text>
  <!-- Rating -->
  <text x="185" y="383" text-anchor="middle" font-family="Arial" font-size="9" fill="#ffee00">★★★★☆</text>
  <text x="247" y="383" text-anchor="middle" font-family="Arial" font-size="9" fill="#aaa">4.5</text>

  <!-- Border neon -->
  <rect x="0" y="0" width="300" height="400" fill="none" stroke="#ffee00" stroke-width="1.5" opacity="0.5" filter="url(#glow2)"/>
  <rect x="3" y="3" width="294" height="394" fill="none" stroke="#ffee00" stroke-width="0.5" opacity="0.2"/>
</svg>
