<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
<linearGradient id="luxSheen" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
  <stop offset="40%" stop-color="#ffffff" stop-opacity="0.04"/>
  <stop offset="100%" stop-color="#000000" stop-opacity="0.06"/>
</linearGradient>
<radialGradient id="luxVignette" cx="50%" cy="45%" r="75%">
  <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
  <stop offset="100%" stop-color="#000000" stop-opacity="0.28"/>
</radialGradient>
<filter id="luxGrain">
  <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="7" stitchTiles="stitch"/>
  <feColorMatrix type="saturate" values="0"/>
  <feComponentTransfer>
    <feFuncA type="table" tableValues="0 0.045"/>
  </feComponentTransfer>
</filter>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0015"/>
      <stop offset="50%" style="stop-color:#1a0030"/>
      <stop offset="100%" style="stop-color:#050010"/>
    </linearGradient>
    <linearGradient id="goldgrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b8860b"/>
      <stop offset="50%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#b8860b"/>
    </linearGradient>
    <radialGradient id="magicglow" cx="50%" cy="60%" r="40%">
      <stop offset="0%" style="stop-color:#9933ff;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#0a0015;stop-opacity:0"/>
    </radialGradient>
    <filter id="magiclglow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="starglow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="400" fill="url(#bg)"/>
  <rect width="300" height="400" fill="url(#magicglow)"/>

  <!-- Stars -->
  <circle cx="15" cy="20" r="1.5" fill="white" opacity="0.9" filter="url(#starglow)"/>
  <circle cx="40" cy="8" r="1" fill="#ffeeaa" opacity="0.8" filter="url(#starglow)"/>
  <circle cx="75" cy="18" r="2" fill="white" opacity="0.7"/>
  <circle cx="110" cy="5" r="1" fill="#ffeeaa" opacity="0.9" filter="url(#starglow)"/>
  <circle cx="145" cy="15" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="180" cy="8" r="1" fill="#ddaaff" opacity="0.9" filter="url(#starglow)"/>
  <circle cx="215" cy="20" r="2" fill="white" opacity="0.7"/>
  <circle cx="250" cy="5" r="1.5" fill="#ffeeaa" opacity="0.8"/>
  <circle cx="280" cy="18" r="1" fill="white" opacity="0.9"/>
  <circle cx="20" cy="55" r="1" fill="#ddaaff" opacity="0.7"/>
  <circle cx="60" cy="42" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="100" cy="50" r="1" fill="#ffeeaa" opacity="0.7"/>
  <circle cx="240" cy="45" r="1" fill="white" opacity="0.8"/>
  <circle cx="290" cy="38" r="1.5" fill="#ddaaff" opacity="0.7"/>

  <!-- Clouds / mist -->
  <ellipse cx="80" cy="160" rx="70" ry="20" fill="#2a0050" opacity="0.5"/>
  <ellipse cx="220" cy="145" rx="60" ry="18" fill="#2a0050" opacity="0.5"/>

  <!-- Hogwarts Castle silhouette -->
  <g fill="#0d0022" opacity="0.95">
    <!-- Main tower left -->
    <rect x="15" y="170" width="40" height="180"/>
    <!-- Tower cap left -->
    <polygon points="15,170 35,130 55,170" fill="#0d0022"/>
    <!-- Window left tower -->
    <rect x="25" y="185" width="12" height="16" rx="3" fill="#aa66ff" opacity="0.4" filter="url(#magiclglow)"/>
    <rect x="25" y="215" width="12" height="16" rx="3" fill="#ffcc44" opacity="0.3"/>
    <rect x="25" y="245" width="12" height="16" rx="3" fill="#aa66ff" opacity="0.35"/>

    <!-- Main body -->
    <rect x="55" y="195" width="190" height="205"/>
    <!-- Battlements on top -->
    <rect x="55" y="190" width="15" height="12"/>
    <rect x="78" y="190" width="15" height="12"/>
    <rect x="101" y="190" width="15" height="12"/>
    <rect x="124" y="190" width="15" height="12"/>
    <rect x="147" y="190" width="15" height="12"/>
    <rect x="170" y="190" width="15" height="12"/>
    <rect x="193" y="190" width="15" height="12"/>
    <rect x="216" y="190" width="15" height="12"/>
    <rect x="239" y="190" width="6" height="12"/>

    <!-- Main tower right -->
    <rect x="245" y="155" width="40" height="245"/>
    <!-- Tower cap right -->
    <polygon points="245,155 265,115 285,155" fill="#0d0022"/>
    <!-- Window right tower -->
    <rect x="253" y="170" width="12" height="16" rx="3" fill="#ffcc44" opacity="0.4"/>
    <rect x="253" y="200" width="12" height="16" rx="3" fill="#aa66ff" opacity="0.35" filter="url(#magiclglow)"/>
    <rect x="253" y="230" width="12" height="16" rx="3" fill="#ffcc44" opacity="0.3"/>

    <!-- Center tall tower -->
    <rect x="125" y="140" width="50" height="260"/>
    <polygon points="125,140 150,100 175,140" fill="#0d0022"/>
    <rect x="135" y="155" width="14" height="18" rx="4" fill="#aa66ff" opacity="0.5" filter="url(#magiclglow)"/>
    <rect x="135" y="188" width="14" height="18" rx="4" fill="#ffcc44" opacity="0.45"/>
    <rect x="135" y="221" width="14" height="18" rx="4" fill="#aa66ff" opacity="0.4"/>
    <rect x="135" y="254" width="14" height="18" rx="4" fill="#ffcc44" opacity="0.35"/>

    <!-- Smaller towers -->
    <rect x="70" y="210" width="25" height="190"/>
    <polygon points="70,210 82,185 95,210" fill="#0d0022"/>
    <rect x="74" y="225" width="8" height="12" rx="2" fill="#aa66ff" opacity="0.4"/>
    <rect x="205" y="215" width="25" height="185"/>
    <polygon points="205,215 217,190 230,215" fill="#0d0022"/>
    <rect x="209" y="230" width="8" height="12" rx="2" fill="#ffcc44" opacity="0.4"/>
  </g>

  <!-- Windows glow on main body -->
  <rect x="70" y="250" width="10" height="14" rx="2" fill="#aa66ff" opacity="0.4"/>
  <rect x="88" y="260" width="10" height="14" rx="2" fill="#ffcc44" opacity="0.35"/>
  <rect x="108" y="248" width="10" height="14" rx="2" fill="#aa66ff" opacity="0.4"/>
  <rect x="170" y="255" width="10" height="14" rx="2" fill="#ffcc44" opacity="0.4"/>
  <rect x="190" y="242" width="10" height="14" rx="2" fill="#aa66ff" opacity="0.35"/>
  <rect x="210" y="258" width="10" height="14" rx="2" fill="#ffcc44" opacity="0.4"/>

  <!-- Magic spell effect -->
  <ellipse cx="150" cy="200" rx="40" ry="40" fill="none" stroke="#aa44ff" stroke-width="1.5" opacity="0.3" filter="url(#magiclglow)"/>
  <ellipse cx="150" cy="200" rx="55" ry="55" fill="none" stroke="#8833dd" stroke-width="1" opacity="0.2"/>
  <!-- Spell sparks -->
  <circle cx="150" cy="155" r="3" fill="#ddaaff" opacity="0.8" filter="url(#starglow)"/>
  <circle cx="110" cy="175" r="2" fill="#aa66ff" opacity="0.7" filter="url(#starglow)"/>
  <circle cx="190" cy="175" r="2" fill="#aa66ff" opacity="0.7" filter="url(#starglow)"/>
  <circle cx="108" cy="215" r="2" fill="#ddaaff" opacity="0.6"/>
  <circle cx="192" cy="215" r="2" fill="#ddaaff" opacity="0.6"/>
  <circle cx="150" cy="248" r="3" fill="#aa66ff" opacity="0.7" filter="url(#starglow)"/>

  <!-- Wand with magic line -->
  <rect x="170" y="165" width="4" height="50" rx="2" fill="#8b6030" transform="rotate(30,172,190)"/>
  <line x1="172" y1="165" x2="130" y2="135" stroke="#aa66ff" stroke-width="1.5" opacity="0.7" filter="url(#magiclglow)"/>
  <circle cx="127" cy="133" r="5" fill="#ddaaff" opacity="0.8" filter="url(#magiclglow)"/>

  <!-- H crest -->
  <circle cx="150" cy="340" r="20" fill="#0d0022" stroke="#b8860b" stroke-width="1.5"/>
  <text x="150" y="347" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="url(#goldgrad)">H</text>

  <!-- Title area -->
  <rect x="0" y="10" width="300" height="92" fill="#000010" opacity="0.85"/>
  <text x="150" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="url(#goldgrad)" letter-spacing="3">HOGWARTS</text>
  <text x="150" y="68" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="white" letter-spacing="1">LEGACY</text>
  <line x1="40" y1="76" x2="260" y2="76" stroke="#b8860b" stroke-width="0.8" opacity="0.7"/>
  <text x="150" y="90" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#9966cc" letter-spacing="2" opacity="0.9" font-style="italic">Discover your Legacy</text>

  <!-- Bottom bar -->
  <rect x="0" y="360" width="300" height="40" fill="#000010" opacity="0.97"/>
  <!-- Xbox badge -->
  <rect x="10" y="367" width="52" height="26" rx="4" fill="#107c10"/>
  <text x="36" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">XBOX</text>
  <!-- Rating -->
  <text x="185" y="383" text-anchor="middle" font-family="Arial" font-size="9" fill="#ffdd00">★★★★★</text>
  <text x="247" y="383" text-anchor="middle" font-family="Arial" font-size="9" fill="#aaa">4.6</text>

  <!-- Border -->
  <rect x="0" y="0" width="300" height="400" fill="none" stroke="#9933ff" stroke-width="2" opacity="0.4" filter="url(#magiclglow)"/>
  <rect x="2" y="2" width="296" height="396" fill="none" stroke="#b8860b" stroke-width="0.5" opacity="0.4"/>
<rect data-lux-overlay="true" x="0" y="0" width="100%" height="100%" fill="url(#luxSheen)" opacity="0.22"/>
<rect x="0" y="0" width="100%" height="100%" fill="url(#luxVignette)" opacity="0.32"/>
<rect x="0" y="0" width="100%" height="100%" filter="url(#luxGrain)" opacity="0.24"/>
</svg>
