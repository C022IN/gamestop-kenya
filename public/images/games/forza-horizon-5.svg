<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
<linearGradient id="luxSheen" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
  <stop offset="40%" stop-color="#ffffff" stop-opacity="0.04"/>
  <stop offset="100%" stop-color="#000000" stop-opacity="0.06"/>
</linearGradient>
<radialGradient id="luxVignette" cx="50%" cy="45%" r="75%">
  <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
  <stop offset="100%" stop-color="#000000" stop-opacity="0.28"/>
</radialGradient>
<filter id="luxGrain">
  <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="7" stitchTiles="stitch"/>
  <feColorMatrix type="saturate" values="0"/>
  <feComponentTransfer>
    <feFuncA type="table" tableValues="0 0.045"/>
  </feComponentTransfer>
</filter>

    <linearGradient id="sunset" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a15"/>
      <stop offset="25%" style="stop-color:#1a0530"/>
      <stop offset="55%" style="stop-color:#7a1a00"/>
      <stop offset="75%" style="stop-color:#cc5500"/>
      <stop offset="100%" style="stop-color:#ff8800"/>
    </linearGradient>
    <linearGradient id="road" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#333333"/>
    </linearGradient>
    <linearGradient id="carglow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6600;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#ff9900;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ff6600;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky/Sunset background -->
  <rect width="300" height="400" fill="url(#sunset)"/>

  <!-- Sun -->
  <circle cx="150" cy="240" r="55" fill="#ff8800" opacity="0.4" filter="url(#glow)"/>
  <circle cx="150" cy="240" r="35" fill="#ffcc00" opacity="0.6"/>
  <circle cx="150" cy="240" r="20" fill="#ffee44" opacity="0.8"/>

  <!-- Horizon haze -->
  <rect x="0" y="235" width="300" height="20" fill="#ff6600" opacity="0.3"/>

  <!-- Mountains silhouette -->
  <polygon points="0,250 40,190 80,230 120,180 160,220 200,170 240,210 280,185 300,200 300,260 0,260" fill="#2d0a00" opacity="0.9"/>

  <!-- Cactus silhouettes -->
  <g fill="#1a0800" opacity="0.8">
    <rect x="22" y="225" width="8" height="30"/>
    <rect x="14" y="235" width="22" height="6"/>
    <rect x="265" y="220" width="8" height="35"/>
    <rect x="257" y="230" width="22" height="6"/>
    <rect x="261" y="233" width="6" height="15"/>
  </g>

  <!-- Road -->
  <polygon points="60,320 240,320 280,400 20,400" fill="url(#road)"/>
  <!-- Road markings -->
  <line x1="150" y1="325" x2="150" y2="395" stroke="white" stroke-width="3" stroke-dasharray="12,10" opacity="0.7"/>
  <line x1="100" y1="325" x2="80" y2="395" stroke="white" stroke-width="2" stroke-dasharray="10,8" opacity="0.4"/>
  <line x1="200" y1="325" x2="220" y2="395" stroke="white" stroke-width="2" stroke-dasharray="10,8" opacity="0.4"/>

  <!-- Car glow on road -->
  <ellipse cx="150" cy="315" rx="80" ry="12" fill="#ff6600" opacity="0.3" filter="url(#glow)"/>

  <!-- Lamborghini-style sports car silhouette -->
  <g transform="translate(150, 290)">
    <!-- Car body - low and wide -->
    <path d="M-80,0 L-90,0 L-90,-8 L-75,-22 L-45,-30 L-15,-36 L15,-36 L45,-30 L75,-22 L90,-8 L90,0 L-80,0 Z" fill="#cc2200"/>
    <!-- Spoiler -->
    <rect x="-80" y="-28" width="12" height="5" rx="2" fill="#990000"/>
    <rect x="-84" y="-32" width="20" height="4" rx="2" fill="#880000"/>
    <!-- Windshield -->
    <path d="M-25,-35 L-15,-36 L15,-36 L25,-35 L20,-22 L-20,-22 Z" fill="#2244aa" opacity="0.7"/>
    <!-- Side windows -->
    <path d="M-45,-30 L-25,-35 L-20,-22 L-40,-22 Z" fill="#2244aa" opacity="0.6"/>
    <path d="M45,-30 L25,-35 L20,-22 L40,-22 Z" fill="#2244aa" opacity="0.6"/>
    <!-- Wheel arches -->
    <ellipse cx="-55" cy="0" rx="22" ry="18" fill="#1a0000"/>
    <ellipse cx="55" cy="0" rx="22" ry="18" fill="#1a0000"/>
    <!-- Wheels -->
    <circle cx="-55" cy="4" r="16" fill="#111"/>
    <circle cx="-55" cy="4" r="10" fill="#444"/>
    <circle cx="-55" cy="4" r="5" fill="#888"/>
    <circle cx="55" cy="4" r="16" fill="#111"/>
    <circle cx="55" cy="4" r="10" fill="#444"/>
    <circle cx="55" cy="4" r="5" fill="#888"/>
    <!-- Headlights -->
    <ellipse cx="82" cy="-12" rx="8" ry="5" fill="#ffff88" opacity="0.9" filter="url(#glow)"/>
    <!-- Taillights -->
    <rect x="-88" y="-18" width="8" height="12" rx="2" fill="#ff2200" opacity="0.9"/>
    <!-- Stripes/details -->
    <line x1="-70" y1="-25" x2="70" y2="-25" stroke="#ff4400" stroke-width="1" opacity="0.5"/>
    <!-- Exhaust flash -->
    <ellipse cx="-90" cy="-5" rx="6" ry="3" fill="#ff6600" opacity="0.8" filter="url(#glow)"/>
    <!-- Motion blur -->
    <line x1="-90" y1="-5" x2="-130" y2="-5" stroke="#ff6600" stroke-width="4" opacity="0.3"/>
    <line x1="-85" y1="2" x2="-125" y2="4" stroke="#ff4400" stroke-width="3" opacity="0.2"/>
  </g>

  <!-- Speed lines -->
  <line x1="0" y1="280" x2="55" y2="285" stroke="#ff8800" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="290" x2="50" y2="293" stroke="#ff6600" stroke-width="1" opacity="0.25"/>
  <line x1="0" y1="300" x2="45" y2="302" stroke="#ff4400" stroke-width="1" opacity="0.2"/>

  <!-- Title section -->
  <rect x="0" y="10" width="300" height="90" fill="#000010" opacity="0.7"/>
  <text x="150" y="38" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="11" font-weight="900" fill="#ff8800" letter-spacing="6">FORZA</text>
  <text x="150" y="65" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="20" font-weight="900" fill="white" letter-spacing="3">HORIZON 5</text>
  <!-- Tagline -->
  <text x="150" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ff8800" letter-spacing="2" opacity="0.8">MEXICO OPEN WORLD</text>

  <!-- Bottom bar -->
  <rect x="0" y="360" width="300" height="40" fill="#000010" opacity="0.95"/>
  <!-- Xbox badge -->
  <rect x="10" y="367" width="52" height="26" rx="4" fill="#107c10"/>
  <text x="36" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">XBOX</text>
  <!-- Rating -->
  <text x="185" y="383" text-anchor="middle" font-family="Arial" font-size="9" fill="#ffdd00">★★★★★</text>
  <text x="247" y="383" text-anchor="middle" font-family="Arial" font-size="9" fill="#aaa">4.7</text>

  <!-- Border -->
  <rect x="0" y="0" width="300" height="400" fill="none" stroke="#ff8800" stroke-width="2" opacity="0.6"/>
<rect data-lux-overlay="true" x="0" y="0" width="100%" height="100%" fill="url(#luxSheen)" opacity="0.22"/>
<rect x="0" y="0" width="100%" height="100%" fill="url(#luxVignette)" opacity="0.32"/>
<rect x="0" y="0" width="100%" height="100%" filter="url(#luxGrain)" opacity="0.24"/>
</svg>
