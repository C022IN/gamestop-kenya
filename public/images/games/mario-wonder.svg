<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
<linearGradient id="luxSheen" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
  <stop offset="40%" stop-color="#ffffff" stop-opacity="0.04"/>
  <stop offset="100%" stop-color="#000000" stop-opacity="0.06"/>
</linearGradient>
<radialGradient id="luxVignette" cx="50%" cy="45%" r="75%">
  <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
  <stop offset="100%" stop-color="#000000" stop-opacity="0.28"/>
</radialGradient>
<filter id="luxGrain">
  <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="7" stitchTiles="stitch"/>
  <feColorMatrix type="saturate" values="0"/>
  <feComponentTransfer>
    <feFuncA type="table" tableValues="0 0.045"/>
  </feComponentTransfer>
</filter>

    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a4a"/>
      <stop offset="40%" style="stop-color:#2244aa"/>
      <stop offset="100%" style="stop-color:#5588ff"/>
    </linearGradient>
    <linearGradient id="ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22aa44"/>
      <stop offset="100%" style="stop-color:#115522"/>
    </linearGradient>
    <radialGradient id="wonderglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffaa00;stop-opacity:0.8"/>
      <stop offset="60%" style="stop-color:#ff44ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0044ff;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Sky background -->
  <rect width="300" height="400" fill="url(#sky)"/>

  <!-- Stars -->
  <circle cx="30" cy="30" r="2" fill="white" opacity="0.9"/>
  <circle cx="80" cy="15" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="130" cy="25" r="2" fill="white" opacity="0.8"/>
  <circle cx="200" cy="10" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="250" cy="30" r="2" fill="white" opacity="0.7"/>
  <circle cx="270" cy="18" r="1" fill="white" opacity="0.8"/>
  <circle cx="50" cy="50" r="1" fill="#ffaa00" opacity="0.9"/>
  <circle cx="170" cy="40" r="1.5" fill="#ff88ff" opacity="0.8"/>
  <circle cx="220" cy="55" r="1" fill="#88ffff" opacity="0.8"/>

  <!-- Floating Wonder Flower glow -->
  <ellipse cx="150" cy="200" rx="100" ry="80" fill="url(#wonderglow)" opacity="0.9"/>

  <!-- Colorful floating platforms -->
  <rect x="20" y="240" width="60" height="15" rx="7" fill="#dd4422"/>
  <rect x="110" y="210" width="80" height="15" rx="7" fill="#2255dd"/>
  <rect x="220" y="245" width="60" height="15" rx="7" fill="#22aa44"/>
  <rect x="60" y="280" width="50" height="15" rx="7" fill="#aa22dd"/>
  <rect x="190" y="280" width="50" height="15" rx="7" fill="#dd8822"/>

  <!-- Question blocks -->
  <rect x="40" y="150" width="35" height="35" rx="5" fill="#dd9900"/>
  <rect x="40" y="150" width="35" height="35" rx="5" fill="none" stroke="#aa6600" stroke-width="2"/>
  <text x="57" y="173" text-anchor="middle" font-family="Arial Black" font-size="18" font-weight="900" fill="white">?</text>

  <rect x="230" y="160" width="35" height="35" rx="5" fill="#dd9900"/>
  <rect x="230" y="160" width="35" height="35" rx="5" fill="none" stroke="#aa6600" stroke-width="2"/>
  <text x="247" y="183" text-anchor="middle" font-family="Arial Black" font-size="18" font-weight="900" fill="white">?</text>

  <!-- Wonder Flower (central) -->
  <g transform="translate(150,195)">
    <!-- Petals -->
    <ellipse cx="0" cy="-28" rx="10" ry="18" fill="#ff44ff" transform="rotate(0)"/>
    <ellipse cx="0" cy="-28" rx="10" ry="18" fill="#ff8844" transform="rotate(45)"/>
    <ellipse cx="0" cy="-28" rx="10" ry="18" fill="#ffff44" transform="rotate(90)"/>
    <ellipse cx="0" cy="-28" rx="10" ry="18" fill="#44ff88" transform="rotate(135)"/>
    <ellipse cx="0" cy="-28" rx="10" ry="18" fill="#4488ff" transform="rotate(180)"/>
    <ellipse cx="0" cy="-28" rx="10" ry="18" fill="#ff4466" transform="rotate(225)"/>
    <ellipse cx="0" cy="-28" rx="10" ry="18" fill="#aa44ff" transform="rotate(270)"/>
    <ellipse cx="0" cy="-28" rx="10" ry="18" fill="#44ffff" transform="rotate(315)"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="16" fill="#ffdd00"/>
    <circle cx="0" cy="0" r="10" fill="#ffaa00"/>
    <text x="0" y="5" text-anchor="middle" font-size="12" fill="white">★</text>
  </g>

  <!-- Mario (stylized figure) -->
  <g transform="translate(105,250)">
    <!-- Hat -->
    <ellipse cx="0" cy="-55" rx="22" ry="8" fill="#cc0000"/>
    <rect x="-18" y="-68" width="36" height="18" rx="8" fill="#cc0000"/>
    <!-- M on hat -->
    <text x="0" y="-56" text-anchor="middle" font-family="Arial Black" font-size="11" font-weight="900" fill="white">M</text>
    <!-- Face -->
    <circle cx="0" cy="-40" r="18" fill="#ffcc88"/>
    <!-- Eyes -->
    <circle cx="-6" cy="-43" r="3" fill="#333"/>
    <circle cx="6" cy="-43" r="3" fill="#333"/>
    <!-- Moustache -->
    <ellipse cx="-8" cy="-35" rx="8" ry="4" fill="#663300"/>
    <ellipse cx="8" cy="-35" rx="8" ry="4" fill="#663300"/>
    <!-- Body -->
    <rect x="-16" y="-22" width="32" height="30" rx="6" fill="#cc0000"/>
    <!-- Overalls -->
    <rect x="-16" y="-10" width="32" height="18" rx="4" fill="#2244cc"/>
    <!-- Buttons -->
    <circle cx="-7" cy="-5" r="3" fill="#ffdd00"/>
    <circle cx="7" cy="-5" r="3" fill="#ffdd00"/>
    <!-- Arms -->
    <circle cx="-28" cy="-10" r="10" fill="#cc0000"/>
    <circle cx="28" cy="-10" r="10" fill="#cc0000"/>
    <!-- Gloves -->
    <circle cx="-33" cy="-5" r="8" fill="white"/>
    <circle cx="33" cy="-5" r="8" fill="white"/>
    <!-- Legs -->
    <rect x="-15" y="8" width="13" height="20" rx="4" fill="#2244cc"/>
    <rect x="2" y="8" width="13" height="20" rx="4" fill="#2244cc"/>
    <!-- Shoes -->
    <ellipse cx="-9" cy="30" rx="12" ry="7" fill="#663300"/>
    <ellipse cx="9" cy="30" rx="12" ry="7" fill="#663300"/>
  </g>

  <!-- Coins -->
  <circle cx="60" cy="170" r="10" fill="#ffdd00"/>
  <text x="60" y="175" text-anchor="middle" font-size="10" font-weight="bold" fill="#aa7700">$</text>
  <circle cx="85" cy="155" r="10" fill="#ffdd00"/>
  <text x="85" y="160" text-anchor="middle" font-size="10" font-weight="bold" fill="#aa7700">$</text>
  <circle cx="215" cy="170" r="10" fill="#ffdd00"/>
  <text x="215" y="175" text-anchor="middle" font-size="10" font-weight="bold" fill="#aa7700">$</text>
  <circle cx="240" cy="150" r="10" fill="#ffdd00"/>
  <text x="240" y="155" text-anchor="middle" font-size="10" font-weight="bold" fill="#aa7700">$</text>

  <!-- Ground -->
  <rect x="0" y="310" width="300" height="90" fill="url(#ground)"/>
  <rect x="0" y="308" width="300" height="8" fill="#33cc55"/>

  <!-- Title area -->
  <rect x="0" y="18" width="300" height="95" fill="#000020" opacity="0.6" rx="0"/>
  <text x="150" y="45" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="11" font-weight="900" fill="#ffdd00" letter-spacing="3">SUPER MARIO BROS.</text>
  <text x="150" y="75" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="white" letter-spacing="1">WONDER</text>
  <!-- Sparkles around title -->
  <text x="28" y="72" font-size="14" fill="#ff88ff">✦</text>
  <text x="260" y="72" font-size="14" fill="#ff88ff">✦</text>
  <text x="15" y="52" font-size="10" fill="#ffdd00">✦</text>
  <text x="275" y="52" font-size="10" fill="#ffdd00">✦</text>

  <!-- Bottom bar -->
  <rect x="0" y="360" width="300" height="40" fill="#110033" opacity="0.95"/>
  <!-- Nintendo Switch badge -->
  <rect x="10" y="367" width="72" height="26" rx="4" fill="#e60012"/>
  <text x="46" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">SWITCH</text>
  <!-- Rating -->
  <text x="190" y="383" text-anchor="middle" font-family="Arial" font-size="9" fill="#ffdd00">★★★★★</text>
  <text x="252" y="383" text-anchor="middle" font-family="Arial" font-size="9" fill="#aaa">4.9</text>

  <!-- Border -->
  <rect x="0" y="0" width="300" height="400" fill="none" stroke="#ffdd00" stroke-width="2" opacity="0.5"/>
<rect data-lux-overlay="true" x="0" y="0" width="100%" height="100%" fill="url(#luxSheen)" opacity="0.22"/>
<rect x="0" y="0" width="100%" height="100%" fill="url(#luxVignette)" opacity="0.32"/>
<rect x="0" y="0" width="100%" height="100%" filter="url(#luxGrain)" opacity="0.24"/>
</svg>
