<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
<linearGradient id="luxSheen" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
  <stop offset="40%" stop-color="#ffffff" stop-opacity="0.04"/>
  <stop offset="100%" stop-color="#000000" stop-opacity="0.06"/>
</linearGradient>
<radialGradient id="luxVignette" cx="50%" cy="45%" r="75%">
  <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
  <stop offset="100%" stop-color="#000000" stop-opacity="0.28"/>
</radialGradient>
<filter id="luxGrain">
  <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="7" stitchTiles="stitch"/>
  <feColorMatrix type="saturate" values="0"/>
  <feComponentTransfer>
    <feFuncA type="table" tableValues="0 0.045"/>
  </feComponentTransfer>
</filter>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050810"/>
      <stop offset="40%" style="stop-color:#0d1525"/>
      <stop offset="100%" style="stop-color:#05080a"/>
    </linearGradient>
    <linearGradient id="aurora" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#004488;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#0088cc;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#004444;stop-opacity:0.5"/>
    </linearGradient>
    <filter id="iceglow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="300" height="400" fill="url(#bg)"/>

  <!-- Aurora borealis -->
  <ellipse cx="80" cy="80" rx="120" ry="60" fill="#004488" opacity="0.25" filter="url(#iceglow)"/>
  <ellipse cx="200" cy="60" rx="100" ry="50" fill="#0066aa" opacity="0.2" filter="url(#iceglow)"/>
  <ellipse cx="150" cy="100" rx="150" ry="40" fill="#003366" opacity="0.3"/>
  <!-- Aurora streaks -->
  <path d="M0,50 Q75,30 150,60 Q225,90 300,50" stroke="#0088ee" stroke-width="2" fill="none" opacity="0.3" filter="url(#iceglow)"/>
  <path d="M0,70 Q75,45 150,80 Q225,110 300,70" stroke="#00aaff" stroke-width="1.5" fill="none" opacity="0.25"/>
  <path d="M0,40 Q100,20 200,55 Q260,75 300,35" stroke="#66ddff" stroke-width="1" fill="none" opacity="0.2"/>

  <!-- Snowflakes/stars -->
  <circle cx="20" cy="30" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="55" cy="15" r="1" fill="#aaddff" opacity="0.9"/>
  <circle cx="100" cy="25" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="160" cy="12" r="1" fill="#aaddff" opacity="0.8"/>
  <circle cx="220" cy="22" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="270" cy="10" r="1" fill="#aaddff" opacity="0.7"/>
  <circle cx="285" cy="35" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="40" cy="45" r="1" fill="white" opacity="0.6"/>
  <circle cx="190" cy="40" r="1" fill="#aaddff" opacity="0.7"/>
  <circle cx="240" cy="48" r="1.5" fill="white" opacity="0.8"/>

  <!-- Leviathan Axe (main artwork) -->
  <g transform="translate(150, 210) rotate(-25)">
    <!-- Axe handle -->
    <rect x="-5" y="0" width="10" height="130" rx="4" fill="#5c3d1e"/>
    <rect x="-4" y="0" width="8" height="130" rx="3" fill="#7a5230"/>
    <!-- Handle wrapping -->
    <rect x="-5" y="20" width="10" height="4" rx="1" fill="#4a2e10" opacity="0.8"/>
    <rect x="-5" y="30" width="10" height="4" rx="1" fill="#4a2e10" opacity="0.8"/>
    <rect x="-5" y="40" width="10" height="4" rx="1" fill="#4a2e10" opacity="0.8"/>
    <rect x="-5" y="60" width="10" height="4" rx="1" fill="#4a2e10" opacity="0.8"/>
    <rect x="-5" y="75" width="10" height="4" rx="1" fill="#4a2e10" opacity="0.8"/>
    <rect x="-5" y="90" width="10" height="4" rx="1" fill="#4a2e10" opacity="0.8"/>
    <!-- Handle end -->
    <ellipse cx="0" cy="128" rx="7" ry="5" fill="#4a2e10"/>
    <rect x="-4" y="125" width="8" height="8" rx="2" fill="#8b6230"/>

    <!-- Axe head - large crescent -->
    <path d="M-8,-15 L-45,-55 Q-80,-30 -75,15 Q-65,50 -30,55 L-8,45 Z" fill="#4488cc" filter="url(#iceglow)"/>
    <!-- Axe head highlight -->
    <path d="M-12,-10 L-42,-48 Q-70,-28 -66,12 Q-58,42 -28,46 L-12,38 Z" fill="#66aaee"/>
    <!-- Blade edge - bright -->
    <path d="M-45,-55 Q-82,-28 -76,15 Q-65,48 -30,55" stroke="#aaddff" stroke-width="2.5" fill="none" filter="url(#iceglow)"/>
    <!-- Inner blade glow lines (Norse runes-like) -->
    <line x1="-30" y1="-25" x2="-55" y2="-10" stroke="#88ccff" stroke-width="1" opacity="0.7"/>
    <line x1="-35" y1="5" x2="-60" y2="15" stroke="#88ccff" stroke-width="1" opacity="0.7"/>
    <line x1="-30" y1="30" x2="-52" y2="35" stroke="#88ccff" stroke-width="1" opacity="0.7"/>
    <!-- Top spike -->
    <polygon points="-8,-15 5,-40 18,-15" fill="#5599dd"/>
    <polygon points="-2,-15 5,-35 12,-15" fill="#77bbff"/>
    <!-- Ice crystals on blade -->
    <circle cx="-45" cy="-5" r="4" fill="#aaddff" opacity="0.6" filter="url(#iceglow)"/>
    <circle cx="-50" cy="20" r="3" fill="#aaddff" opacity="0.5" filter="url(#iceglow)"/>
    <circle cx="-35" cy="45" r="3" fill="#aaddff" opacity="0.5" filter="url(#iceglow)"/>
  </g>

  <!-- Frost/ice particle effects -->
  <circle cx="60" cy="170" r="3" fill="#88ccff" opacity="0.4" filter="url(#iceglow)"/>
  <circle cx="90" cy="150" r="2" fill="#aaddff" opacity="0.5" filter="url(#iceglow)"/>
  <circle cx="220" cy="180" r="3" fill="#88ccff" opacity="0.4" filter="url(#iceglow)"/>
  <circle cx="250" cy="155" r="2" fill="#aaddff" opacity="0.5" filter="url(#iceglow)"/>
  <circle cx="45" cy="250" r="2" fill="#88ccff" opacity="0.4"/>
  <circle cx="255" cy="260" r="2" fill="#88ccff" opacity="0.4"/>

  <!-- Norse rune-like symbols -->
  <g opacity="0.15" stroke="#88aacc" stroke-width="1" fill="none">
    <text x="30" y="300" font-size="20" fill="#445566" opacity="0.3">ᚱ</text>
    <text x="60" y="320" font-size="16" fill="#445566" opacity="0.25">ᚨ</text>
    <text x="220" y="295" font-size="20" fill="#445566" opacity="0.3">ᚷ</text>
    <text x="248" y="315" font-size="16" fill="#445566" opacity="0.25">ᚾ</text>
  </g>

  <!-- Kratos circular emblem at bottom center -->
  <circle cx="150" cy="330" r="28" fill="#0d1525" stroke="#334466" stroke-width="1.5"/>
  <circle cx="150" cy="330" r="22" fill="#0d1525" stroke="#88aacc" stroke-width="0.5" opacity="0.4"/>
  <!-- Omega symbol simplified -->
  <path d="M135,340 Q128,320 140,315 Q150,310 160,315 Q172,320 165,340" stroke="#aaccee" stroke-width="2" fill="none"/>
  <line x1="131" y1="340" x2="169" y2="340" stroke="#aaccee" stroke-width="2"/>

  <!-- Title area -->
  <rect x="0" y="10" width="300" height="92" fill="#000a12" opacity="0.85"/>
  <text x="150" y="35" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="10" font-weight="900" fill="#aaccee" letter-spacing="5">GOD OF WAR</text>
  <text x="150" y="70" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="24" font-weight="900" fill="white" letter-spacing="1">RAGNARÖK</text>
  <line x1="30" y1="78" x2="270" y2="78" stroke="#4488cc" stroke-width="1" opacity="0.6"/>
  <text x="150" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#668899" letter-spacing="3">THE NORSE SAGA ENDS</text>

  <!-- Bottom bar -->
  <rect x="0" y="360" width="300" height="40" fill="#000810" opacity="0.97"/>
  <!-- PS5 badge -->
  <rect x="10" y="367" width="52" height="26" rx="4" fill="#003791"/>
  <text x="36" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">PS5</text>
  <!-- Rating -->
  <text x="185" y="383" text-anchor="middle" font-family="Arial" font-size="9" fill="#ffdd00">★★★★★</text>
  <text x="247" y="383" text-anchor="middle" font-family="Arial" font-size="9" fill="#aaa">4.9</text>

  <!-- Border -->
  <rect x="0" y="0" width="300" height="400" fill="none" stroke="#4488cc" stroke-width="2" opacity="0.5" filter="url(#softglow)"/>
<rect data-lux-overlay="true" x="0" y="0" width="100%" height="100%" fill="url(#luxSheen)" opacity="0.22"/>
<rect x="0" y="0" width="100%" height="100%" fill="url(#luxVignette)" opacity="0.32"/>
<rect x="0" y="0" width="100%" height="100%" filter="url(#luxGrain)" opacity="0.24"/>
</svg>
