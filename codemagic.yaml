workflows:
  gamestop-movies-tv-android:
    name: GameStop Movies TV — Android
    max_build_duration: 60
    environment:
      node: 18.20.4
      java: 17
      android_signing:
        - gamestop_movies_tv_keystore
      vars:
        PACKAGE_NAME: "ke.co.gamestop.movies"

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install Node dependencies
        working_directory: tv-app
        script: npm ci

      - name: Bootstrap Gradle wrapper
        working_directory: tv-app/android
        script: |
          gradle wrapper --gradle-version=8.8 --distribution-type=bin
          chmod +x gradlew

      - name: Build Release APK + AAB
        working_directory: tv-app/android
        script: |
          ./gradlew assembleRelease bundleRelease \
            -PversionCode=$BUILD_NUMBER \
            --no-daemon

    artifacts:
      - tv-app/android/app/build/outputs/apk/release/*.apk
      - tv-app/android/app/build/outputs/bundle/release/*.aab
      - tv-app/android/app/build/outputs/mapping/release/mapping.txt

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal          # Start on internal track, promote to production manually
        submit_as_draft: true

      email:
        recipients:
          - collanjeo@gmail.com
        notify:
          success: true
          failure: true
